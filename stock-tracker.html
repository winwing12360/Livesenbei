<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const C={
  bg:"#F5F3EE",surface:"#FFFFFF",stamp:"#B44635",ink:"#2D2416",
  inkMuted:"#7A6E5E",line:"#E5E0D5",stripe:"#FAF8F5",
  info:"#1D6FA3",infoSoft:"#EFF6FC",
  success:"#2D7D46",successSoft:"#EBF5EE",
  warning:"#92400E",warningSoft:"#FFF8ED",
  orange:"#E65100",orangeSoft:"#FFF3E0",
};
const GIST_FILE="stock-tracker-data.json";

// ── 工具 ──
function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function itemKey(it){return[it.product,it.color,it.size,it.style].join("|||");}
// 正規化 key：把 / 和多餘空白統一，用於跨 CSV 格式比對
function nkStr(s){return String(s||"").replace(/｜/g,"|").replace(/\//g," ").replace(/\s+/g," ").trim().toLowerCase();}
function normalizedKey(it){return[it.product,it.color,it.size,it.style].map(nkStr).join("|||");}
// flatKey：終極模糊比對；style 去括號後比對，避免選項在括號內被省略
function flatKey(it){
  const ns=s=>String(s||"")
    .replace(/女裝顏色[:：]|男裝顏色[:：]|顏色[:：]|女裝尺寸[:：]|男裝尺寸[:：]|兒童尺寸[:：]|尺寸[:：]|尺碼[:：]|身高[:：]|體重[:：]|規格[:：]|款式[:：]/g,"")
    .replace(/[｜|\/_:：\s\-·（）()【】\u3000\u3001\u3002＊＋]/g,"")
    .toLowerCase();
  const p=ns(it.product),c=ns(it.color),z=ns(it.size),st=ns(it.style);
  // 去掉括號內選項後再比對：若 style 只在括號選項裡（如天絲/小腰），仍須保留
  const pNoParens=ns(String(it.product||"").replace(/[（(][^）)]*[）)]/g,""));
  const stAdd=st&&!pNoParens.includes(st)?st:"";
  return p+c+z+stAdd;
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtSavedTime(d){if(!d)return"";return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtTs(ts){if(!ts)return"";const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function daysSince(dateStr){if(!dateStr||isNaN(new Date(dateStr)))return null;return Math.floor((new Date(todayStr())-new Date(dateStr))/(864e5));}
function isLateOrder(it){if(it.allOrdered||it.allArrived||it.firstOrderDate)return false;const d=daysSince(it.importedAt);return d!==null&&d>3;}
function isLateArrival(it){if(it.allArrived||!it.firstOrderDate)return false;const d=daysSince(it.firstOrderDate);return d!==null&&d>14;}
// 尺寸排序：S→M→L→XL→2XL，童裝 80→90→100→130
const SIZE_ORDER=["XS","S","M","L","XL","XXL","2XL","3XL","4XL","F","FREE"];
function sizeOrder(s){
  const u=String(s||"").toUpperCase().trim();
  const i=SIZE_ORDER.indexOf(u);if(i>=0)return i;
  const n=parseInt(s,10);if(!isNaN(n))return 100+n;
  return 9999;
}
// 去掉款式結尾的顏色詞，取得基底款式名（如「牛仔小個白」→「牛仔小個」）
const COLOR_SUFFIXES=["深灰","灰綠","藏青","卡其","橘紅","白","黑","藍","灰","紅","粉","綠","橘","紫","棕"];
function getBaseStyle(style){
  for(const c of COLOR_SUFFIXES){if(style.endsWith(c))return style.slice(0,-c.length);}
  return style;
}
function getGroupKey(it){
  if(!it.size)return it.product+"|||"+getBaseStyle(it.style||it.color||"");
  return it.product+"|||"+[it.style,it.color].filter(Boolean).join("·");
}
function getGroupLabel(it){
  if(!it.size)return getBaseStyle(it.style||it.color||"")||it.product;
  return [it.style,it.color].filter(Boolean).join(" ")||it.product;
}
function getSortSize(it){return sizeOrder(it.size||it.color);}
function sortPri(it){if(it.allArrived)return 4;if(it.allOrdered)return 3;if(it.firstOrderDate)return 2;return 1;}
const GROUP_LABEL={1:"📋 未開始訂貨",2:"🚚 訂貨中",3:"📦 全數訂完，待到貨",4:"✅ 已到貨"};
function makeOrderKey(customerKey,items){return customerKey+"||"+items.map(it=>itemKey(it)+"x"+it.qty).sort().join("|");}

// ── CSV 解析 ──
function parseLine(line){const out=[];let cur="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur="";}else cur+=ch;}out.push(cur);return out;}
function parseBakuCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.replace(/\r/g,"").split("\n").filter(Boolean);
  if(lines.length<2)return[];
  const hdr=parseLine(lines[0]).map(h=>h.trim());
  const ix=k=>hdr.findIndex(h=>h===k);
  const[pi,ci,si,sti,qi]=["商品名稱","顏色","尺寸","款式","數量"].map(ix);
  // 去掉商品名結尾無斜線的括號備注（如「商品名(內褲組也在這）」→「商品名」）
  const normProd=s=>s.replace(/\s*[（(][^/／）)]*[）)]\s*$/,"").trim()||s;
  const rawRows=lines.slice(1).map(line=>{const cols=parseLine(line).map(c=>c.trim());return{product:normProd(cols[pi]||""),color:cols[ci]||"",size:cols[si]||"",style:cols[sti]||"",qty:parseInt(cols[qi],10)||0};}).filter(r=>r.product);
  // 合併相同 key 的品項
  const merged={};
  rawRows.forEach(r=>{const k=[r.product,r.color,r.size,r.style].join("|||");if(!merged[k])merged[k]={...r};else merged[k].qty+=r.qty;});
  return Object.values(merged);
}

// ── 規格解析 ──
function normalizeStr(s){return String(s||"").replace(/\s+/g," ").trim();}
function parseAllocSpec(raw){
  const s=normalizeStr(raw).replace(/^規格選擇[:：]\s*/,"");
  if(!s)return{color:"",size:"",style:""};
  // 只在「/後面緊接中文字」的地方切，避免把 S/90-100 裡的斜線也切掉
  const segs=s.split(/\/(?=[\u4e00-\u9fff])/).map(x=>x.trim()).filter(Boolean);
  const colors=[],sizes=[],extras=[];
  segs.forEach(seg=>{const m=seg.match(/^(.+?)[:：](.+)$/);if(m){const k=m[1].trim(),v=m[2].trim();if(k.includes("顏色"))colors.push(v);else if(["尺寸","尺碼","身高","體重","全尺碼"].some(x=>k.includes(x)))sizes.push(v);else extras.push(`${k}:${v}`);}else extras.push(seg);});
  return{color:colors.join("/"),size:sizes.join("/"),style:extras.join("；")};
}

// ── SENBEI 訂單解析 ──
function parseSenbeiAOA(aoa){
  let mCols=null,dCols=null;
  for(const r of aoa){
    if(!r||!r[0])continue;
    const c0=normalizeStr(String(r[0]));
    if(c0.includes("表頭")&&c0.includes("M")){const m={};r.forEach((v,i)=>{if(v)m[normalizeStr(String(v))]=i;});mCols={account:m["訂購人"]??1,name:m["收件人"]??2,amount:m["小計"]??m["總金額(含運)"]??m["總金額"]??-1};}
    if(c0.includes("明細")&&c0.includes("D")){const m={};r.forEach((v,i)=>{if(v)m[normalizeStr(String(v))]=i;});const sk=Object.keys(m).find(k=>k.includes("規格"));dCols={product:m["商品名稱"]??1,qty:m["訂購數量"]??3,spec:sk?m[sk]:4};}
    if(mCols&&dCols)break;
  }
  mCols=mCols||{account:1,name:2,amount:-1};
  dCols=dCols||{product:1,qty:3,spec:4};
  const customers={};const orders=[];let curOrder=null;
  aoa.forEach((r)=>{
    const c0=normalizeStr(String(r?.[0]??""));
    if(c0==="M"){
      const acc=normalizeStr(r[mCols.account]||"");const name=normalizeStr(r[mCols.name]||"");
      const amtStr=mCols.amount>=0?String(r[mCols.amount]||""):"0";
      const amount=parseFloat(amtStr.replace(/[^0-9.-]/g,""))||0;
      const key=acc||name;
      if(!customers[key])customers[key]={account:acc,name,totalAmount:0};
      customers[key].totalAmount+=amount;
      curOrder={orderRef:`${key}_${orders.length+1}`,customerKey:key,amount,items:[]};
      orders.push(curOrder);
    }else if(c0==="D"&&curOrder){
      let product=normalizeStr(r[dCols.product]||"");if(!product)return;
      const qty=parseInt(r[dCols.qty],10)||1;
      let specText=normalizeStr(r[dCols.spec]||"");
      if(!specText){const idx=product.lastIndexOf("_(");if(idx>=0&&product.endsWith(")")){specText=product.slice(idx+2,-1);product=product.slice(0,idx).trim();}}
      const{color,size,style}=parseAllocSpec(specText);
      curOrder.items.push({product,color,size,style,qty});
    }
  });
  return{customers,orders};
}

// ── 配貨演算法 ── 回傳 savedAlloc 格式
function computeAlloc(parsed,stockItems){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)-(it.shippedQty||0));});
  // 依客人總金額排序訂單
  const sorted=[...orders].sort((a,b)=>(customers[b.customerKey]?.totalAmount||0)-(customers[a.customerKey]?.totalAmount||0));
  const result={};
  sorted.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const allocItems=[],waitingItems=[];
    o.items.forEach(item=>{
      const _k=flatKey(item);
      const rem=stock[_k]||0;
      const give=Math.min(item.qty,rem);if(give>0)stock[_k]=Math.max(0,rem-give);
      if(give>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:give});
      if(give<item.qty)waitingItems.push({...item,orderedQty:item.qty,allocatedQty:0});
    });
    result[oKey]={
      customerAccount:customers[o.customerKey]?.account||o.customerKey,
      customerName:customers[o.customerKey]?.name||"",
      orderAmount:o.amount,
      customerTotalAmount:customers[o.customerKey]?.totalAmount||0,
      orderIndex:sorted.indexOf(o)+1,
      allocItems,waitingItems,
      shippedAt:null,shippedOrderNo:null,
    };
  });
  return result;
}

// ── 比例分配演算法 ──
function computeProportionalAlloc(parsed,stockItems){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)-(it.shippedQty||0));});
  // 計算每個SKU的總訂購量
  const totalOrdered={};
  orders.forEach(o=>{o.items.forEach(item=>{const k=flatKey(item)||normalizedKey(item);totalOrdered[k]=(totalOrdered[k]||0)+item.qty;});});
  // 計算每個SKU的到貨比例（上限1）
  const ratio={};
  Object.keys(totalOrdered).forEach(k=>{ratio[k]=Math.min(1,(stock[k]||0)/(totalOrdered[k]||1));});
  // 第一輪：floor分配
  const orderFloors={};// oKey → {sku → {base, frac, item}}
  const baseSum={};// sku → 已分配底數總和
  orders.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    orderFloors[oKey]={};
    o.items.forEach(item=>{
      const k=flatKey(item)||normalizedKey(item);const r=ratio[k]||0;
      const exact=item.qty*r;const base=Math.floor(exact);const frac=exact-base;
      orderFloors[oKey][k]={base,frac,item};
      baseSum[k]=(baseSum[k]||0)+base;
    });
  });
  // 第二輪：剩餘件數按小數點大小補給
  Object.keys(totalOrdered).forEach(sku=>{
    let remaining=(stock[sku]||0)-(baseSum[sku]||0);
    if(remaining<=0)return;
    const candidates=[];
    Object.entries(orderFloors).forEach(([oKey,skuMap])=>{if(skuMap[sku]&&skuMap[sku].frac>0)candidates.push({oKey,frac:skuMap[sku].frac});});
    candidates.sort((a,b)=>b.frac-a.frac);
    for(let i=0;i<Math.min(remaining,candidates.length);i++){orderFloors[candidates[i].oKey][sku].base+=1;}
  });
  // 組裝結果（依客人金額排序顯示）
  const sorted=[...orders].sort((a,b)=>(customers[b.customerKey]?.totalAmount||0)-(customers[a.customerKey]?.totalAmount||0));
  const result={};
  sorted.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const allocItems=[],waitingItems=[];
    o.items.forEach(item=>{
      const k=flatKey(item)||normalizedKey(item);const allocQty=orderFloors[oKey]?.[k]?.base||0;
      if(allocQty>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:allocQty});
      if(allocQty<item.qty)waitingItems.push({...item,orderedQty:item.qty-allocQty,allocatedQty:0,qty:item.qty-allocQty});
    });
    result[oKey]={customerAccount:customers[o.customerKey]?.account||o.customerKey,customerName:customers[o.customerKey]?.name||"",orderAmount:o.amount,customerTotalAmount:customers[o.customerKey]?.totalAmount||0,orderIndex:sorted.indexOf(o)+1,allocItems,waitingItems,shippedAt:null,shippedOrderNo:null};
  });
  return result;
}
// ── 重新計算（已出貨訂單保留shipments，重算剩餘未出品項；未出貨訂單全部重算）──
function recalculateAlloc(currentAlloc,parsed,stockItems,method){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)-(it.shippedQty||0));});
  const shippedArr=[],unshippedArr=[];
  orders.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const ex=currentAlloc[oKey];
    const isShip=ex&&(ex.shipments?.length>0||ex.shippedAt);
    if(isShip)shippedArr.push({o,oKey,ex});else unshippedArr.push(o);
  });
  const result={};
  // 已出貨訂單：依客人金額高低優先取得剩餘庫存，保留 shipments 歷史
  shippedArr.sort((a,b)=>(customers[b.o.customerKey]?.totalAmount||0)-(customers[a.o.customerKey]?.totalAmount||0));
  shippedArr.forEach(({o,oKey,ex})=>{
    // 計算每個SKU已出貨數量（從 shipments 陣列加總）
    const alreadyShipped={};
    (ex.shipments||[]).forEach(s=>{
      (s.items||[]).forEach(si=>{
        const fk=flatKey(si);
        alreadyShipped[fk]=(alreadyShipped[fk]||0)+(si.allocatedQty||0);
      });
    });
    const allocItems=[],waitingItems=[];
    o.items.forEach(item=>{
      const shipped=alreadyShipped[flatKey(item)]||0;
      const remaining=item.qty-shipped;
      if(remaining<=0)return; // 已全數出貨，略過
      const _kr=flatKey(item);
      const rem=stock[_kr]||0;
      const give=Math.min(remaining,rem);
      if(give>0)stock[_kr]=Math.max(0,rem-give);
      if(give>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:give});
      if(give<remaining)waitingItems.push({...item,orderedQty:remaining-give,allocatedQty:0,qty:remaining-give});
    });
    result[oKey]={...ex,allocItems,waitingItems};
  });
  // 未出貨訂單：用剩餘庫存重新計算
  if(unshippedArr.length>0){
    const sub={customers,orders:unshippedArr};
    const fresh=method==="proportional"?computeProportionalAlloc(sub,stockItems):computeAlloc(sub,stockItems);
    Object.assign(result,fresh);
  }
  return result;
}
async function gFetch(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.v3+json"}});
  if(!r.ok)throw new Error(`無法讀取 (HTTP ${r.status})`);
  const d=await r.json();const content=d.files[GIST_FILE]?.content;
  try{const p=JSON.parse(content||"{}");return{items:(p.items||[]).map(migrateItem),savedAlloc:p.savedAlloc||null};}catch{return{items:[],savedAlloc:null};}
}
async function gSave(token,gistId,items,savedAlloc){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify({items,savedAlloc},null,2)}}})});
  if(!r.ok)throw new Error(`儲存失敗 (HTTP ${r.status})`);
}
async function gCreate(token){
  const r=await fetch("https://api.github.com/gists",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({description:"備貨追蹤 - 理貨台",public:false,files:{[GIST_FILE]:{content:JSON.stringify({items:[],savedAlloc:null})}}})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`建立失敗 (${r.status})：${e.message||"請確認Token是否有gist權限"}`);}
  return(await r.json()).id;
}
function migrateItem(it){
  return{...it,firstOrderDate:it.firstOrderDate||it.supplierOrderDate||"",secondOrderDate:it.secondOrderDate||"",allOrdered:it.allOrdered||false,orderedQty:it.orderedQty!=null?it.orderedQty:it.qty,arrivedQty:it.arrivedQty!=null?it.arrivedQty:(it.arrived?it.qty:0),shippedQty:it.shippedQty||0,allArrived:it.allArrived||it.arrived||false,arrivedTs:it.arrivedTs||"",firstArrivedTs:it.firstArrivedTs||"",importedAt:it.importedAt||it.orderDate||todayStr()};
}

// ── Setup ──
function Setup({onDone}){
  const[tkn,setTkn]=useState("");const[gid,setGid]=useState("");const[name,setName]=useState("第一場次");const[err,setErr]=useState("");const[busy,setBusy]=useState(false);const[newId,setNewId]=useState("");
  async function handle(createNew){
    if(!tkn.trim()){setErr("請輸入Token");return;}if(!createNew&&!gid.trim()){setErr("請輸入Gist ID");return;}
    setErr("");setBusy(true);
    try{let id=gid.trim();if(createNew){id=await gCreate(tkn.trim());setNewId(id);}await gFetch(tkn.trim(),id);localStorage.setItem("st_token",tkn.trim());onDone(tkn.trim(),id,name.trim()||"第一場次");}catch(e){setErr(e.message);}finally{setBusy(false);}
  }
  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,maxWidth:480,width:"100%",border:`1px solid ${C.line}`}}>
        <h1 style={{color:C.stamp,fontWeight:700,fontSize:20,marginBottom:4}}>備貨追蹤 初次設定</h1>
        <p style={{color:C.inkMuted,fontSize:12,marginBottom:20}}>資料儲存在GitHub Gist，換裝置關手機都不會消失</p>
        <div style={{background:C.infoSoft,color:C.info,border:`1px solid ${C.info}`,borderRadius:10,padding:12,marginBottom:20,fontSize:12,lineHeight:2}}>
          <strong>先建立GitHub存取金鑰（只要做一次）</strong><br/>
          1. github.com → 右上角頭像 → Settings<br/>
          2. 左側最下方 Developer settings → Personal access tokens → Tokens (classic)<br/>
          3. Generate new token (classic) → 只勾 <code style={{background:"rgba(0,0,0,0.08)",padding:"1px 4px",borderRadius:3}}>gist</code> → Generate token<br/>
          4. 複製產生的token（只出現一次）
        </div>
        <label style={{color:C.inkMuted,fontSize:12,display:"block",marginBottom:4}}>GitHub Token</label>
        <input type="password" value={tkn} onChange={e=>setTkn(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"8px 12px",fontSize:13,marginBottom:12,fontFamily:"monospace",boxSizing:"border-box"}}/>
        <label style={{color:C.inkMuted,fontSize:12,display:"block",marginBottom:4}}>第一個場次名稱</label>

// ── 配貨視圖 ──
function AllocationView({items,savedAlloc,onClose,onSaveAlloc,onConfirmShipment}){
  const[editAlloc,setEditAlloc]=useState(savedAlloc||null);
  const[allocMethod,setAllocMethod]=useState("amount"); // "amount" | "proportional"
  const[parsedCSV,setParsedCSV]=useState(null); // 暫存解析後的CSV，模式切換時重新計算
  const[fileName,setFileName]=useState("");
  const[err,setErr]=useState("");
  const[editingKey,setEditingKey]=useState(null);
  const[shipInputs,setShipInputs]=useState({});
  const fileRef=useRef(null);

  useEffect(()=>{if(savedAlloc&&!editAlloc){setEditAlloc(savedAlloc);}
  },[savedAlloc]);

  // 模式切換時重新計算
  useEffect(()=>{
    if(!parsedCSV)return;
    recompute(parsedCSV,allocMethod);
  },[allocMethod]);

  function recompute(parsed,method){
    // 用 recalculateAlloc 確保已出貨訂單（含 shipments 陣列）完整保留
    const next=recalculateAlloc(editAlloc||{},parsed,items,method);
    setEditAlloc(next);onSaveAlloc(next);
  }

  // 計算每個SKU的可用庫存（arrivedQty - shippedQty）
  // 不同批次出貨用不同顏色
  const SHIP_COLORS=[
    {bg:C.successSoft,color:C.success,border:C.success},      // 第1次：綠
    {bg:C.infoSoft,color:C.info,border:C.info},               // 第2次：藍
    {bg:C.orangeSoft,color:C.orange,border:"#FFB74D"},        // 第3次：橙
    {bg:C.warningSoft,color:C.warning,border:C.warning},      // 第4次：咖
    {bg:"#F3E8FF",color:"#7C3AED",border:"#A78BFA"},          // 第5次+：紫
  ];
  function shipColor(idx){return SHIP_COLORS[Math.min(idx,SHIP_COLORS.length-1)];}
  const stockMap=useMemo(()=>{
    const m={};items.forEach(it=>{const fk=flatKey(it);m[fk]=(m[fk]||0)+Math.max(0,(it.arrivedQty||0)-(it.shippedQty||0));});return m;
  },[items]);

  // 計算目前editAlloc中每個SKU已分配出去的總數
  function computeAllocUsage(alloc,excludeKey){
    const usage={};
    Object.entries(alloc||{}).forEach(([k,o])=>{
      if(k===excludeKey)return;
      o.allocItems.forEach(it=>{const fk=flatKey(it);usage[fk]=(usage[fk]||0)+it.allocatedQty;});
    });
    return usage;
  }

  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    setFileName(f.name);setErr("");
    const reader=new FileReader();
    reader.onload=ev=>{
      let text=ev.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const aoa=text.replace(/\r/g,"").split("\n").filter(Boolean).map(l=>parseLine(l));
      const parsed=parseSenbeiAOA(aoa);
      if(!parsed.orders||!parsed.orders.length){setErr("找不到訂單資料，請確認這是SENBEI匯出的CSV（含M/D開頭的列）");return;}
      setParsedCSV(parsed);
      recompute(parsed,allocMethod);
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  }

  function updateAllocQty(oKey,sku,delta){
    const usage=computeAllocUsage(editAlloc,oKey);
    const available=Math.max(0,(stockMap[sku]||0)-(usage[sku]||0)); // sku 是 normalizedKey
    setEditAlloc(prev=>{
      const order={...prev[oKey]};
      let allocItems=[...order.allocItems];
      let item=allocItems.find(it=>flatKey(it)===sku||normalizedKey(it)===sku||itemKey(it)===sku);
      if(!item&&delta>0){
        const wi=order.waitingItems.find(it=>flatKey(it)===sku||normalizedKey(it)===sku||itemKey(it)===sku);
        if(wi){item={...wi,allocatedQty:0};allocItems=[...allocItems,item];order.allocItems=allocItems;}
      }
      if(!item)return prev;
      const maxByOrder=item.orderedQty||item.qty||999; // 不可超過客人訂購數量
      const newQty=Math.max(0,Math.min(available+item.allocatedQty,maxByOrder,item.allocatedQty+delta));
      const matchSku=(it)=>{const fk=flatKey(it);return fk===sku||normalizedKey(it)===sku||itemKey(it)===sku;};
      const newAllocItems=order.allocItems.map(it=>matchSku(it)?{...it,allocatedQty:newQty}:it);
      // 如果減少了分配量，多出來的就放回waiting
      const diff=item.allocatedQty-newQty;
      let newWaitingItems=[...order.waitingItems];
      if(diff>0){
        const existing=newWaitingItems.find(it=>matchSku(it));
        if(existing)newWaitingItems=newWaitingItems.map(it=>matchSku(it)?{...it,allocatedQty:0,orderedQty:(it.orderedQty||it.qty)+diff}:it);
        else{const orig=newAllocItems.find(it=>matchSku(it))||item;newWaitingItems.push({...orig,allocatedQty:0,orderedQty:diff,qty:diff});}
      }else if(diff<0){
        // 從waiting取回
        newWaitingItems=newWaitingItems.map(it=>{if(matchSku(it)&&(it.orderedQty||it.qty)>0){const take=Math.min(Math.abs(diff),(it.orderedQty||it.qty));return{...it,orderedQty:(it.orderedQty||it.qty)-take};}return it;}).filter(it=>(it.orderedQty||it.qty)>0);
      }
      const next={...prev,[oKey]:{...order,allocItems:newAllocItems,waitingItems:newWaitingItems}};
      onSaveAlloc(next);
      return next;
    });
  }

  function confirmShipment(oKey,orderNo){
    setEditAlloc(prev=>{
      const order=prev[oKey];
      const shippedItems=order.allocItems.filter(it=>it.allocatedQty>0);
      const newShipment={orderNo,shippedAt:new Date().toISOString(),items:shippedItems};
      const existingShipments=order.shipments||(order.shippedAt?[{orderNo:order.shippedOrderNo,shippedAt:order.shippedAt,items:order.allocItems}]:[]);
      const next={...prev,[oKey]:{...order,
        allocItems:[],
        shipments:[...existingShipments,newShipment],
        shippedAt:null,shippedOrderNo:null,
      }};
      onSaveAlloc(next);
      onConfirmShipment(oKey,shippedItems,next); // 明確傳遞最新 alloc，避免閉包舊值
      return next;
    });
    setShipInputs(p=>({...p,[oKey]:""}));
  }

  function revokeShipment(oKey,idx){
    setEditAlloc(prev=>{
      const order=prev[oKey];
      const revokedShipment=(order.shipments||[])[idx];
      const newShipments=(order.shipments||[]).filter((_,i)=>i!==idx);
      // 把撤銷的品項還回 allocItems
      const revokedItems=revokedShipment?.items||[];
      const newAllocItems=[...(order.allocItems||[])];
      revokedItems.forEach(ri=>{
        if(!ri.allocatedQty)return;
        const ex=newAllocItems.find(it=>itemKey(it)===itemKey(ri));
        if(ex){ex.allocatedQty=(ex.allocatedQty||0)+ri.allocatedQty;}
        else{newAllocItems.push({...ri});}
      });
      const next={...prev,[oKey]:{...order,allocItems:newAllocItems,shipments:newShipments}};
      onSaveAlloc(next);
      return next;
    });
  }

  function handleRecalculate(){
    if(!parsedCSV){alert("請先上傳訂單CSV才能重新計算");return;}
    const next=recalculateAlloc(editAlloc,parsedCSV,items,allocMethod);
    setEditAlloc(next);
    onSaveAlloc(next);
  }

  function exportCSV(){
    if(!editAlloc)return;
    const header=["IG帳號","客人姓名","客人總金額","訂單金額","商品","顏色","尺寸","款式","數量","狀態","出貨單號","出貨時間"];
    const rows=[];
    // 依客人總金額排序
    const sorted=Object.values(editAlloc).sort((a,b)=>b.customerTotalAmount-a.customerTotalAmount);
    sorted.forEach(o=>{
      const status=o.shippedAt?"✅ 已出貨":"可出貨";
      o.allocItems.forEach(it=>{if(it.allocatedQty>0)rows.push([o.customerAccount,o.customerName,o.customerTotalAmount,o.orderAmount,it.product,it.color,it.size,it.style,it.allocatedQty,status,o.shippedOrderNo||"",o.shippedAt?fmtTs(o.shippedAt):""])});
      o.waitingItems.forEach(it=>{if((it.orderedQty||it.qty)>0)rows.push([o.customerAccount,o.customerName,o.customerTotalAmount,o.orderAmount,it.product,it.color,it.size,it.style,it.orderedQty||it.qty,"⏳ 待補貨","",""]);});
    });
    const csv=[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="撿貨清單.csv";a.click();URL.revokeObjectURL(url);
  }

  // 整理顯示資料：依客人總金額排序，每個客人下面列各筆訂單
  const displayData=useMemo(()=>{
    if(!editAlloc)return[];
    const byCust={};
    Object.entries(editAlloc).forEach(([oKey,o])=>{
      const ck=o.customerAccount||o.customerName;
      if(!byCust[ck])byCust[ck]={account:o.customerAccount,name:o.customerName,totalAmount:o.customerTotalAmount,orders:[]};
      byCust[ck].orders.push({oKey,...o});
    });
    return Object.values(byCust).sort((a,b)=>b.totalAmount-a.totalAmount);
  },[editAlloc]);

  const totalOrders=Object.keys(editAlloc||{}).length;
  const shippedCount=Object.values(editAlloc||{}).filter(o=>o.shippedAt).length;
  const readyCount=Object.values(editAlloc||{}).filter(o=>!o.shippedAt&&o.allocItems.some(it=>it.allocatedQty>0)).length;

  return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:16,color:C.ink}}>配貨</div>
          <div style={{fontSize:12,color:C.inkMuted}}>自動分配已到貨庫存</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {editAlloc&&<button onClick={exportCSV} style={{background:C.info,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>匯出清單</button>}
          <button onClick={onClose} style={{color:C.inkMuted,border:`1px solid ${C.line}`,background:C.surface,borderRadius:8,padding:"7px 12px",fontSize:13,cursor:"pointer"}}>← 返回</button>
        </div>
      </div>

      {/* 配貨模式切換 */}

          <button onClick={()=>setAllocMethod("proportional")}

      <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:600,color:C.ink,marginBottom:6}}>上傳 SENBEI 訂單 CSV</div>
        <div style={{fontSize:12,color:C.inkMuted,marginBottom:10}}>和匯入理貨台的那份相同。如果已有上傳過的配貨結果，重新上傳會重新計算但保留出貨記錄。</div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>fileRef.current.click()} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>選擇訂單CSV</button>
          {fileName&&<span style={{fontSize:12,color:C.inkMuted}}>{fileName}</span>}
          {editAlloc&&(
            <button onClick={handleRecalculate}
              style={{background:C.surface,color:C.info,border:`1px solid ${C.info}`,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>

        </div>
        <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
        {editAlloc&&<div style={{fontSize:11,color:C.inkMuted,marginTop:6}}>到貨數量更新後點「重新計算配貨」，新增庫存會自動補給待補的客人（已出貨的不受影響）。若跨天重開網頁需重新上傳CSV才能計算。</div>}
        {err&&<div style={{color:C.stamp,fontSize:12,marginTop:8}}>{err}</div>}

      {!editAlloc&&items.filter(it=>Math.max(0,(it.arrivedQty||0)-(it.shippedQty||0))>0).length===0&&items.length>0&&(
        <div style={{background:C.warningSoft,border:`1px solid ${C.warning}`,borderRadius:12,padding:14,fontSize:12,color:C.warning,marginBottom:12}}>
          ⚠ 目前沒有可配貨的庫存（已到貨件數為0或已全數出貨）。請先到備貨追蹤頁面填好到貨數量。
        </div>
      )}

      {editAlloc&&(
        <div style={{display:"flex",gap:10,marginBottom:12,fontSize:13,flexWrap:"wrap",color:C.inkMuted}}>
          <span>共 {totalOrders} 筆訂單</span>
          <span style={{color:C.success}}>📦 已出貨 {shippedCount}</span>
          <span style={{color:C.info}}>✅ 可出貨 {readyCount}</span>
        </div>
      )}

      {displayData.map((c,ci)=>(
        <div key={c.account||c.name||ci} style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:12,marginBottom:10,padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <span style={{fontWeight:700,fontSize:14,color:C.ink}}>{c.account||c.name}</span>

            </div>

          </div>

          {c.orders.map((o,oi)=>{
            const canShip=o.allocItems.some(it=>it.allocatedQty>0);
            const shipments=o.shipments||(o.shippedAt?[{orderNo:o.shippedOrderNo,shippedAt:o.shippedAt}]:[]);
            const hasShipments=shipments.length>0;
            const isShipped=hasShipments; // 有任何出貨記錄就算已出貨過
            const usage=computeAllocUsage(editAlloc,o.oKey);
            return(
              <div key={o.oKey} style={{borderTop:oi>0?`1px solid ${C.line}`:"none",paddingTop:oi>0?10:0,marginTop:oi>0?10:0}}>

                  <div style={{fontSize:11,fontWeight:600,color:C.inkMuted,marginBottom:6}}>
                    訂單{oi+1}　NT${o.orderAmount.toLocaleString()}

                )}

                {/* 出貨歷史記錄 */}
                {shipments.map((s,si)=>{

                      </div>
                      {sItems.map((it,ii)=>(
                        <div key={ii} style={{fontSize:12,color:sc.color,paddingLeft:4,lineHeight:1.8}}>
                          {[it.product,it.color,it.size,it.style].filter(Boolean).join(" ")} × {it.allocatedQty}
                        </div>
                      ))}
                    </div>
                  );
                })}

                {/* 可出貨/等待出貨品項 */}
                {o.allocItems.filter(it=>it.allocatedQty>0).length>0&&(
                  <div style={{marginBottom:6}}>
                    <div style={{fontSize:11,color:C.success,fontWeight:700,marginBottom:4}}>✅ 可出貨{hasShipments?"（新一批）":""}</div>
                    {o.allocItems.filter(it=>it.allocatedQty>0).map((it,i)=>{
                      const sku=flatKey(it);
                      const snk=normalizedKey(it);
                      const otherUsage=Math.max(usage[sku]||0,usage[snk]||0);
                      const available=Math.max(0,Math.max(stockMap[sku]||0,stockMap[snk]||0)-otherUsage);
                      const isEditing=editingKey===o.oKey;
                      return(
                        <div key={i} style={{background:C.successSoft,borderRadius:8,padding:"6px 10px",marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                            <span style={{fontSize:13,color:C.success,fontWeight:500,flex:1}}>{[it.product,it.color,it.size,it.style].filter(Boolean).join(" ")}</span>
                            {isEditing?(
                              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                                <button onClick={()=>updateAllocQty(o.oKey,sku,-1)} disabled={it.allocatedQty<=0} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.line}`,background:"#fff",cursor:it.allocatedQty>0?"pointer":"default",fontSize:16,fontWeight:700,color:C.ink}}>−</button>
                                <span style={{fontSize:13,fontWeight:700,color:C.success,minWidth:20,textAlign:"center"}}>{it.allocatedQty}</span>
                                <button onClick={()=>updateAllocQty(o.oKey,sku,1)} disabled={it.allocatedQty>=available+it.allocatedQty} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.line}`,background:"#fff",cursor:it.allocatedQty<available+it.allocatedQty?"pointer":"default",fontSize:16,fontWeight:700,color:C.ink}}>＋</button>
                                <span style={{fontSize:10,color:C.inkMuted}}>可用{available+it.allocatedQty}</span>
                              </div>
                            ):(
                              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                                <strong style={{fontSize:13,color:C.success}}>× {it.allocatedQty}</strong>
                                <button onClick={()=>updateAllocQty(o.oKey,sku,-it.allocatedQty)}
                                  style={{fontSize:11,color:C.inkMuted,border:`1px solid ${C.line}`,background:"rgba(255,255,255,0.8)",borderRadius:6,padding:"1px 7px",cursor:"pointer",whiteSpace:"nowrap"}}>
                                  釋放
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* 待補貨品項 */}
                {o.waitingItems.filter(it=>(it.orderedQty||it.qty)>0).length>0&&(
                  <div style={{marginBottom:6}}>
                    <div style={{fontSize:11,color:C.orange,fontWeight:700,marginBottom:4}}>⏳ 待補貨</div>
                    {o.waitingItems.filter(it=>(it.orderedQty||it.qty)>0).map((it,i)=>{
                      const sku=flatKey(it);
                      const snk=normalizedKey(it);
                      const otherUsage=Math.max(usage[sku]||0,usage[snk]||0);
                      const available=Math.max(0,Math.max(stockMap[sku]||0,stockMap[snk]||0)-otherUsage);
                      const waitQty=it.orderedQty||it.qty;
                      return(
                        <div key={i} style={{background:C.orangeSoft,borderRadius:8,padding:"6px 10px",marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                            <span style={{fontSize:13,color:C.orange,flex:1}}>{[it.product,it.color,it.size,it.style].filter(Boolean).join(" ")}</span>
                            {available>0?(
                              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                                <span style={{fontSize:12,color:C.inkMuted}}>待 {waitQty}</span>
                                <button onClick={()=>updateAllocQty(o.oKey,sku,available)}
                                  style={{background:C.success,color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                                  補入{available}件
                                </button>
                              </div>
                            ):(
                              <span style={{fontSize:13,color:C.orange,flexShrink:0}}>× {waitQty}</span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* 出貨操作列（有可出貨品項就顯示） */}
                {canShip&&(
                  <div style={{marginTop:6}}>
                    <div style={{display:"flex",gap:6,marginBottom:6}}>
                      <button onClick={()=>setEditingKey(editingKey===o.oKey?null:o.oKey)} style={{background:editingKey===o.oKey?C.info:C.surface,color:editingKey===o.oKey?"#fff":C.inkMuted,border:`1px solid ${editingKey===o.oKey?C.info:C.line}`,borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>
                        {editingKey===o.oKey?"完成調整":"調整配貨"}
                      </button>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <input type="text" value={shipInputs[o.oKey]||""} onChange={e=>setShipInputs(p=>({...p,[o.oKey]:e.target.value}))}
                        placeholder={hasShipments?"填入第二次出貨單號":"填入出貨單號"}
                        style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,minWidth:0}}/>
                      <button onClick={()=>{if(shipInputs[o.oKey]?.trim())confirmShipment(o.oKey,shipInputs[o.oKey].trim());}}
                        disabled={!shipInputs[o.oKey]?.trim()}
                        style={{background:shipInputs[o.oKey]?.trim()?C.success:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:shipInputs[o.oKey]?.trim()?"pointer":"default",whiteSpace:"nowrap"}}>
                        確認出貨
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── 主應用 ──
function App(){
  const[token,setToken]=useState(()=>localStorage.getItem("st_token")||"");
  const[workspaces,setWorkspaces]=useState(()=>{const raw=localStorage.getItem("st_workspaces");if(raw){try{return JSON.parse(raw);}catch{}}const oldGist=localStorage.getItem("st_gist_id");if(oldGist)return[{name:"第一場次",gistId:oldGist}];return[];});
  const[activeIdx,setActiveIdx]=useState(()=>{const i=parseInt(localStorage.getItem("st_active")||"0",10);return isNaN(i)?0:i;});
  const gistId=workspaces[activeIdx]?.gistId||"";
  const[setupMode,setSetupMode]=useState(()=>{const raw=localStorage.getItem("st_workspaces");if(raw){try{const w=JSON.parse(raw);return w.length===0;}catch{}}return!localStorage.getItem("st_gist_id");});
  const[showWorkspaces,setShowWorkspaces]=useState(false);const[newWsName,setNewWsName]=useState("");const[newWsBusy,setNewWsBusy]=useState(false);const[newWsErr,setNewWsErr]=useState("");
  const[items,setItems]=useState([]);
  const[savedAlloc,setSavedAlloc]=useState(null);
  const savedAllocRef=useRef(null); // 用 ref 避免閉包舊值問題
  const[filter,setFilter]=useState("unordered");const[search,setSearch]=useState("");
  const[loading,setLoading]=useState(false);const[saving,setSaving]=useState(false);const[lastSaved,setLastSaved]=useState(null);const[globalErr,setGlobalErr]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[batchSel,setBatchSel]=useState(new Set());const[batchDate1,setBatchDate1]=useState("");const[batchDate2,setBatchDate2]=useState("");
  const[allocMode,setAllocMode]=useState(false);
  const fileRef=useRef(null);const saveTimer=useRef(null);

  useEffect(()=>{savedAllocRef.current=savedAlloc;},[savedAlloc]);
  useEffect(()=>{
    if(!setupMode&&token&&gistId){setLoading(true);gFetch(token,gistId).then(({items:its,savedAlloc:sa})=>{setItems(its);setSavedAlloc(sa);setLoading(false);}).catch(e=>{setGlobalErr(e.message);setLoading(false);});}
  },[]);

  const scheduleSave=useCallback((newItems,newAlloc)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      // 用 ref 讀最新值，避免閉包舊值覆蓋出貨記錄
      const allocToSave=newAlloc!==undefined?newAlloc:savedAllocRef.current;
      setSaving(true);
      gSave(token,gistId,newItems,allocToSave).then(()=>{setSaving(false);setLastSaved(new Date());}).catch(e=>{setSaving(false);setGlobalErr("自動儲存失敗："+e.message);});
    },800);
  },[token,gistId]);

  function updateField(id,field,value){setItems(prev=>{const next=prev.map(it=>it.id===id?{...it,[field]:value}:it);scheduleSave(next);return next;});}

  function saveWorkspaces(ws,idx){localStorage.setItem("st_workspaces",JSON.stringify(ws));localStorage.setItem("st_active",String(idx));}

  function switchWorkspace(idx){
    setActiveIdx(idx);localStorage.setItem("st_active",String(idx));
    setItems([]);setSavedAlloc(null);setFilter("unordered");setSearch("");setShowWorkspaces(false);setAllocMode(false);
    const gid=workspaces[idx]?.gistId;
    if(gid&&token){setLoading(true);gFetch(token,gid).then(({items:its,savedAlloc:sa})=>{setItems(its);setSavedAlloc(sa);setLoading(false);}).catch(e=>{setGlobalErr(e.message);setLoading(false);});}
  }
  async function addWorkspace(){
    if(!newWsName.trim()){setNewWsErr("請輸入場次名稱");return;}setNewWsErr("");setNewWsBusy(true);
    try{const id=await gCreate(token);const ws=[...workspaces,{name:newWsName.trim(),gistId:id}];const idx=ws.length-1;setWorkspaces(ws);setActiveIdx(idx);saveWorkspaces(ws,idx);setItems([]);setSavedAlloc(null);setFilter("unordered");setSearch("");setShowWorkspaces(false);setNewWsName("");}catch(e){setNewWsErr(e.message);}finally{setNewWsBusy(false);}
  }
  function deleteWorkspace(idx){
    if(!window.confirm(`確定刪除「${workspaces[idx].name}」？（只刪除本機記錄，Gist資料不受影響）`))return;
    const ws=workspaces.filter((_,i)=>i!==idx);const newIdx=Math.min(activeIdx,Math.max(0,ws.length-1));
    setWorkspaces(ws);setActiveIdx(newIdx);saveWorkspaces(ws,newIdx);
    if(ws.length===0){setSetupMode(true);setShowWorkspaces(false);}else switchWorkspace(newIdx);
  }
  function resetSetup(){localStorage.removeItem("st_token");localStorage.removeItem("st_gist_id");localStorage.removeItem("st_workspaces");localStorage.removeItem("st_active");setToken("");setWorkspaces([]);setActiveIdx(0);setItems([]);setSavedAlloc(null);setSetupMode(true);setShowSettings(false);setShowWorkspaces(false);}
  function handleCSV(e){
    const files=Array.from(e.target.files||[]);if(!files.length)return;
    Promise.all(files.map(file=>new Promise(resolve=>{const reader=new FileReader();reader.onload=ev=>resolve(parseBakuCSV(ev.target.result));reader.readAsText(file,"utf-8");})))
    .then(results=>{
      const aggMap={};results.forEach(parsed=>{parsed.forEach(p=>{const k=itemKey(p);if(aggMap[k])aggMap[k].qty+=p.qty;else aggMap[k]={...p};});});
      setItems(prev=>{
        const ex={};prev.forEach(it=>{ex[itemKey(it)]=it;});
        const merged=Object.values(aggMap).map(p=>{const k=itemKey(p);if(ex[k])return{...ex[k],qty:p.qty};return{...p,id:genId(),importedAt:todayStr(),firstOrderDate:"",secondOrderDate:"",allOrdered:false,orderedQty:p.qty,arrivedQty:0,shippedQty:0,allArrived:false,arrivedTs:"",firstArrivedTs:""};});
        const mk=new Set(merged.map(itemKey));prev.forEach(it=>{if(!mk.has(itemKey(it)))merged.push(it);});
        scheduleSave(merged);return merged;
      });
    });
    e.target.value="";
  }

  if(setupMode)return<Setup onDone={(t,g,name)=>{setToken(t);const ws=[{name:name||"第一場次",gistId:g}];setWorkspaces(ws);setActiveIdx(0);saveWorkspaces(ws,0);localStorage.setItem("st_token",t);setSetupMode(false);gFetch(t,g).then(({items:its,savedAlloc:sa})=>{setItems(its);setSavedAlloc(sa);}).catch(e=>setGlobalErr(e.message));}}/>;

  // 需求彙總資料（useMemo 預先計算）
  const summaryData=useMemo(()=>{
    const prodGroups={};
    items.forEach(it=>{
      if(!prodGroups[it.product])prodGroups[it.product]=[];
      prodGroups[it.product].push(it);
    });
    return Object.keys(prodGroups).sort((a,b)=>a.localeCompare(b)).map(prod=>{
      const its=prodGroups[prod];
      const hasSizeField=its.some(it=>it.size);
      const varGroups={};
      its.forEach(it=>{
        const vk=hasSizeField?[it.style,it.color].filter(Boolean).join(" "):(it.style||it.color||"");
        const sd=hasSizeField?it.size:(it.color||"");
        if(!varGroups[vk])varGroups[vk]={sizes:{}};
        varGroups[vk].sizes[sd]=(varGroups[vk].sizes[sd]||0)+it.qty;
      });
      const prodTotal=its.reduce((s,i)=>s+i.qty,0);
      const variants=Object.keys(varGroups).sort((a,b)=>a.localeCompare(b)).map(vk=>{
        const sg=varGroups[vk].sizes;
        const szKeys=Object.keys(sg).sort((a,b)=>sizeOrder(a)-sizeOrder(b));
        // 判斷此款式是否全部已訂完
        const grpItems=its.filter(it2=>{const v2=hasSizeField?[it2.style,it2.color].filter(Boolean).join(" "):(it2.style||it2.color||"");return v2===vk;});
        // 全部有訂購日 = 已訂（綠色）；部分有訂購日 = 訂貨中（橘色）
        const orderedCount=grpItems.filter(it2=>it2.firstOrderDate||it2.allOrdered).length;
        const allOrdered=grpItems.length>0&&orderedCount===grpItems.length;
        const anyOrdered=orderedCount>0;
        return{vk,szKeys,sg,total:szKeys.reduce((s,k)=>s+sg[k],0),allOrdered,anyOrdered};
      });
      return{prod,prodTotal,variants};
    });
  },[items]);

  const displayed=items.filter(it=>{if(filter==="unordered")return!it.allArrived&&!it.firstOrderDate;if(filter==="ordered")return!it.allArrived&&!!it.firstOrderDate;if(filter==="arrived")return it.allArrived;return true;}).filter(it=>!search.trim()||it.product.includes(search.trim())).slice().sort((a,b)=>{
  const pd=sortPri(a)-sortPri(b);if(pd!==0)return pd;
  const gka=getGroupKey(a),gkb=getGroupKey(b);
  const cd=gka.localeCompare(gkb);if(cd!==0)return cd;
  return getSortSize(a)-getSortSize(b);
});
  const arrivedCount=items.filter(it=>it.allArrived).length;
  const late3Count=items.filter(isLateOrder).length;
  const late14Count=items.filter(isLateArrival).length;
  const allSel=displayed.length>0&&displayed.every(it=>batchSel.has(it.id));

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:batchSel.size>0?220:0}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div>
            <div style={{color:C.stamp,fontWeight:700,fontSize:17}}>備貨追蹤</div>
            <button onClick={()=>{setShowWorkspaces(!showWorkspaces);setShowSettings(false);}} style={{color:C.inkMuted,fontSize:12,background:"none",border:"none",padding:0,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}>
              {workspaces[activeIdx]?.name||"場次"} <span style={{fontSize:10}}>▼</span>
            </button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {saving&&<span style={{color:C.inkMuted,fontSize:11}}>儲存中…</span>}
            {lastSaved&&!saving&&<span style={{color:C.inkMuted,fontSize:11}}>已儲存 {fmtSavedTime(lastSaved)}</span>}
            {!allocMode&&<button onClick={()=>fileRef.current.click()} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>匯入備貨清單</button>}
            <input ref={fileRef} type="file" accept=".csv" multiple style={{display:"none"}} onChange={handleCSV}/>
            <button onClick={()=>{setAllocMode(!allocMode);setShowWorkspaces(false);setShowSettings(false);}} style={{background:allocMode?C.info:C.surface,color:allocMode?"#fff":C.inkMuted,border:`1px solid ${allocMode?C.info:C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,fontWeight:allocMode?"600":"400",cursor:"pointer"}}>配貨</button>
            <button onClick={()=>{setShowSettings(!showSettings);setShowWorkspaces(false);}} style={{border:`1px solid ${C.line}`,background:C.surface,color:C.inkMuted,borderRadius:8,padding:"7px 10px",fontSize:14,cursor:"pointer"}}>⚙</button>
          </div>
        </div>
        {showWorkspaces&&(
          <div style={{background:C.surface,borderTop:`1px solid ${C.line}`,padding:"12px 14px"}}>
            <div style={{maxWidth:640,margin:"0 auto"}}>
              <div style={{color:C.inkMuted,fontSize:11,marginBottom:8,fontWeight:600}}>切換場次</div>
              {workspaces.map((ws,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
                  <button onClick={()=>switchWorkspace(i)} style={{flex:1,textAlign:"left",background:i===activeIdx?C.infoSoft:C.stripe,color:i===activeIdx?C.info:C.ink,border:`1px solid ${i===activeIdx?C.info:C.line}`,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:i===activeIdx?"600":"400",cursor:"pointer"}}>{i===activeIdx?"▶ ":""}{ws.name}</button>
                  {workspaces.length>1&&<button onClick={()=>deleteWorkspace(i)} style={{color:C.inkMuted,border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:"6px 8px",fontSize:12,cursor:"pointer"}}>刪除</button>}
                </div>
              ))}
              <div style={{borderTop:`1px solid ${C.line}`,marginTop:10,paddingTop:10}}>
                <div style={{color:C.inkMuted,fontSize:11,marginBottom:6,fontWeight:600}}>新增場次</div>
                <div style={{display:"flex",gap:6}}>
                  <input type="text" value={newWsName} onChange={e=>setNewWsName(e.target.value)} placeholder="場次名稱，例如：0630直播" style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13}}/>
                  <button onClick={addWorkspace} disabled={!newWsName.trim()||newWsBusy} style={{background:newWsName.trim()&&!newWsBusy?C.stamp:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:newWsName.trim()&&!newWsBusy?"pointer":"default",whiteSpace:"nowrap"}}>{newWsBusy?"建立中…":"新增"}</button>
                </div>
                {newWsErr&&<div style={{color:C.stamp,fontSize:12,marginTop:4}}>{newWsErr}</div>}
              </div>
            </div>
          </div>
        )}
        {showSettings&&(
          <div style={{background:C.stripe,borderTop:`1px solid ${C.line}`,padding:"10px 14px",fontSize:12,color:C.inkMuted}}>
            <div style={{maxWidth:640,margin:"0 auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>Gist ID：<code style={{fontSize:11,color:C.ink}}>{gistId}</code></span>
              <button onClick={()=>{try{navigator.clipboard.writeText(gistId);}catch{}}} style={{border:`1px solid ${C.line}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>複製</button>
              <button onClick={resetSetup} style={{color:C.stamp,border:`1px solid ${C.stamp}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>重置所有設定</button>
            </div>
          </div>
        )}
      </div>

      {allocMode&&<AllocationView items={items} savedAlloc={savedAlloc} onClose={()=>setAllocMode(false)}
        onSaveAlloc={(newAlloc)=>{setSavedAlloc(newAlloc);scheduleSave(items,newAlloc);}}
        onConfirmShipment={(oKey,shippedItems,newAlloc)=>{
          // 扣除庫存，並明確傳遞最新 alloc 避免閉包舊值問題
          setItems(prev=>{
            const next=prev.map(it=>{
              const shipped=shippedItems.find(s=>itemKey(s)===itemKey(it));
              if(!shipped||!shipped.allocatedQty)return it;
              const newShipped=Math.min((it.shippedQty||0)+shipped.allocatedQty,it.arrivedQty||0);
              return{...it,shippedQty:newShipped};
            });
            scheduleSave(next,newAlloc);
            return next;
          });
        }}
      />}

      {!allocMode&&(
        <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
          {globalErr&&(<div style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{globalErr}</span><button onClick={()=>setGlobalErr("")} style={{marginLeft:8,textDecoration:"underline",cursor:"pointer"}}>關閉</button></div>)}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{color:C.ink,fontSize:14}}>已到貨 <strong style={{color:C.success}}>{arrivedCount}</strong> / {items.length} 筆</span>
            {late3Count>0&&<span style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>⚠ {late3Count} 筆逾3天未訂</span>}
            {late14Count>0&&<span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>🚨 {late14Count} 筆逾14天未到</span>}
            <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
              {[["unordered","未訂貨"],["ordered","已訂待到"],["arrived","已到貨"]].map(([v,l])=>(<button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?C.stamp:C.surface,color:filter===v?"#fff":C.inkMuted,border:`1px solid ${filter===v?C.stamp:C.line}`,borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>{l}</button>))}
            </div>
          </div>
          <div style={{position:"relative",marginBottom:10}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:16,pointerEvents:"none"}}>🔍</span>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋商品名稱" style={{width:"100%",border:`1px solid ${search?C.info:C.line}`,borderRadius:10,padding:"9px 36px 9px 34px",fontSize:14,background:C.surface,color:C.ink,boxSizing:"border-box"}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:18,background:"none",border:"none",cursor:"pointer"}}>×</button>}
          </div>
          {displayed.length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <input type="checkbox" checked={allSel} onChange={e=>{if(e.target.checked)setBatchSel(new Set([...batchSel,...displayed.map(it=>it.id)]));else setBatchSel(prev=>{const n=new Set(prev);displayed.forEach(it=>n.delete(it.id));return n;});}} style={{width:22,height:22,accentColor:C.info,cursor:"pointer"}}/>
              <span style={{color:C.inkMuted,fontSize:14}}>{batchSel.size>0?<strong style={{color:C.info}}>已選 {batchSel.size} 筆</strong>:"全選"}</span>
              {batchSel.size>0&&<span style={{color:C.inkMuted,fontSize:12}}>— 在下方設定日期後按套用</span>}
            </div>
          )}

          {loading?(<div style={{color:C.inkMuted,textAlign:"center",padding:"48px 0",fontSize:14}}>讀取中…</div>)
          :items.length===0?(<div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"64px 16px"}}><div style={{fontSize:36,marginBottom:12}}>📦</div><div style={{fontSize:15,fontWeight:600,marginBottom:6}}>還沒有備貨資料</div><div style={{fontSize:13}}>點右上角「匯入備貨清單」上傳從理貨台匯出的CSV</div></div>)
          :displayed.length===0?(<div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"40px 16px",fontSize:14}}>這個分類目前沒有資料</div>)
          :(displayed.map((it,idx)=>{const prev=displayed[idx-1];const showStatus=idx===0||(prev&&sortPri(prev)!==sortPri(it));const showGroup=idx===0||(prev&&getGroupKey(prev)!==getGroupKey(it));return(<React.Fragment key={it.id}>{showStatus&&<div style={{color:C.inkMuted,fontSize:12,fontWeight:700,padding:"4px 2px 12px",marginTop:idx===0?0:16}}>{GROUP_LABEL[sortPri(it)]}</div>}{showGroup&&(()=>{
  const groupKey=getGroupKey(it);
  const groupTotal=displayed.filter(x=>getGroupKey(x)===groupKey).reduce((s,x)=>s+x.qty,0);
  return <div style={{background:C.stripe,borderRadius:10,padding:"6px 12px",marginBottom:4,marginTop:showStatus?0:8}}>
    <span style={{fontSize:14,fontWeight:700,color:C.ink}}>{getGroupLabel(it)}</span>
    <span style={{fontSize:12,color:C.inkMuted,marginLeft:6}}>共{groupTotal}件</span>
    {getGroupLabel(it)!==it.product&&<span style={{fontSize:10,color:C.inkMuted,marginLeft:6}}>{it.product}</span>}
  </div>;
})()}<ItemCard it={it} sel={batchSel.has(it.id)} onToggleSel={()=>setBatchSel(prev=>{const n=new Set(prev);n.has(it.id)?n.delete(it.id):n.add(it.id);return n;})} onUpdate={(field,value)=>updateField(it.id,field,value)}/></React.Fragment>);}))
          }
        </div>
      )}

      {batchSel.size>0&&!allocMode&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.ink,zIndex:50,padding:"14px 16px",boxShadow:"0 -4px 20px rgba(0,0,0,0.3)"}}>
          <div style={{maxWidth:640,margin:"0 auto"}}>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginBottom:10}}>已選 <strong style={{color:"#fff"}}>{batchSel.size}</strong> 筆，設定訂購日後按套用</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,width:60,flexShrink:0}}>首次訂購日</span>
                <input type="date" value={batchDate1} onChange={e=>setBatchDate1(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 10px",fontSize:14,color:"#fff"}}/>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,firstOrderDate:batchDate1}:it);scheduleSave(next);return next;});setBatchDate1("");}} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>套用</button>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,firstOrderDate:""}:it);scheduleSave(next);return next;});}} style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"8px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>清除</button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,width:60,flexShrink:0}}>二次訂購日</span>
                <input type="date" value={batchDate2} onChange={e=>setBatchDate2(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 10px",fontSize:14,color:"#fff"}}/>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,secondOrderDate:batchDate2}:it);scheduleSave(next);return next;});setBatchDate2("");}} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>套用</button>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,secondOrderDate:""}:it);scheduleSave(next);return next;});}} style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"8px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>清除</button>
              </div>
              <button onClick={()=>{setBatchSel(new Set());setBatchDate1("");setBatchDate2("");}} style={{background:"transparent",color:"rgba(255,255,255,0.5)",border:"none",padding:"4px",fontSize:13,cursor:"pointer",textAlign:"center"}}>取消選取</button>
            </div>
          </div>
        </div>
      )}
      {/* 需求彙總（底部）*/}
      {summaryData.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:14,padding:"14px 16px",margin:"16px 0"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.inkMuted,marginBottom:10}}>📋 需求彙總</div>
          {summaryData.map(({prod,prodTotal,variants})=>(
            <div key={prod} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.inkMuted,marginBottom:4}}>{prod} <span style={{fontWeight:400}}>共{prodTotal}件</span></div>
              {variants.map(({vk,szKeys,sg,total,allOrdered,anyOrdered})=>{
                const color=allOrdered?C.success:anyOrdered?C.orange:C.ink;
                const bg=allOrdered?"#d4edda":anyOrdered?"#fff3e0":C.stripe;
                return(
                  <div key={vk||"_"} style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:4,marginBottom:3,opacity:allOrdered?0.5:1}}>
                    {vk&&<span style={{fontSize:12,fontWeight:600,color,minWidth:80,textDecoration:allOrdered?"line-through":"none"}}>{vk}</span>}
                    {szKeys.map(sz=>(<span key={sz} style={{background:bg,borderRadius:12,padding:"2px 7px",fontSize:11,color}}>{sz}×{sg[sz]}</span>))}
                    <span style={{fontSize:11,color:C.inkMuted}}>共{total}件</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
      {/* 置頂按鈕 */}
      <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
        style={{position:"fixed",bottom:24,right:20,width:44,height:44,borderRadius:22,
          background:C.ink,color:"#fff",border:"none",fontSize:20,cursor:"pointer",
          boxShadow:"0 2px 10px rgba(0,0,0,0.25)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
        ↑
      </button>
    </div>
  );
}

try{const root=ReactDOM.createRoot(document.getElementById("root"));root.render(<App/>);}catch(err){document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">Render錯誤：\n'+(err&&err.stack?err.stack:String(err))+'</div>';}
</script>
</body>
</html>
