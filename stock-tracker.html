<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>備貨追蹤</title>
<script>
window.onerror=function(msg,src,line,col,err){
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">錯誤：\n'+String(msg)+'\n第'+line+'行\n'+(err&&err.stack?String(err.stack):'')+' </div>';
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#F5F3EE;}
input[type="date"]{-webkit-appearance:none;appearance:none;}
input[type="number"]{-webkit-appearance:none;-moz-appearance:textfield;}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

const C={
  bg:"#F5F3EE",surface:"#FFFFFF",stamp:"#B44635",ink:"#2D2416",
  inkMuted:"#7A6E5E",line:"#E5E0D5",stripe:"#FAF8F5",
  info:"#1D6FA3",infoSoft:"#EFF6FC",
  success:"#2D7D46",successSoft:"#EBF5EE",
  warning:"#92400E",warningSoft:"#FFF8ED",
  orange:"#E65100",orangeSoft:"#FFF3E0",
};
const GIST_FILE="stock-tracker-data.json";

function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function itemKey(it){return[it.product,it.color,it.size,it.style].join("|||");}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtSavedTime(d){if(!d)return"";return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtTs(ts){
  if(!ts)return"";
  const d=new Date(ts);
  return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function daysSince(dateStr){
  if(!dateStr||isNaN(new Date(dateStr)))return null;
  return Math.floor((new Date(todayStr())-new Date(dateStr))/(864e5));
}

// 警示判斷
function isLateOrder(it){
  if(it.allOrdered||it.allArrived||it.firstOrderDate)return false;
  const d=daysSince(it.importedAt||it.orderDate);
  return d!==null&&d>3;
}
function isLateArrival(it){
  if(it.allArrived||!it.firstOrderDate)return false;
  const d=daysSince(it.firstOrderDate);
  return d!==null&&d>14;
}

// 排序優先度
// 1=完全未操作 2=訂貨中（未全數訂完） 3=全數訂完待到貨 4=已到貨
function sortPri(it){
  if(it.allArrived)return 4;
  if(it.allOrdered)return 3;
  if(it.firstOrderDate)return 2;
  return 1;
}

const GROUP_LABEL={
  1:"📋 未開始訂貨",
  2:"🚚 訂貨中",
  3:"📦 全數訂完，待到貨",
  4:"✅ 已到貨",
};

function parseLine(line){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(ch===','&&!q){out.push(cur);cur="";}
    else cur+=ch;
  }
  out.push(cur);return out;
}
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.replace(/\r/g,"").split("\n").filter(Boolean);
  if(lines.length<2)return[];
  const hdr=parseLine(lines[0]).map(h=>h.trim());
  const ix=k=>hdr.findIndex(h=>h===k);
  const[pi,ci,si,sti,qi]=["商品名稱","顏色","尺寸","款式","數量"].map(ix);
  return lines.slice(1).map(line=>{
    const cols=parseLine(line).map(c=>c.trim());
    return{product:cols[pi]||"",color:cols[ci]||"",size:cols[si]||"",style:cols[sti]||"",qty:parseInt(cols[qi],10)||0};
  }).filter(r=>r.product);
}

// 舊資料欄位相容轉換
function migrateItem(it){
  return{
    ...it,
    firstOrderDate: it.firstOrderDate||it.supplierOrderDate||"",
    secondOrderDate: it.secondOrderDate||"",
    allOrdered: it.allOrdered||false,
    orderedQty: it.orderedQty!=null?it.orderedQty:it.qty,
    allArrived: it.allArrived||it.arrived||false,
    arrivedTs: it.arrivedTs||"",
    importedAt: it.importedAt||it.orderDate||todayStr(),
  };
}

async function gFetch(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.v3+json"}
  });
  if(!r.ok)throw new Error(`無法讀取 (HTTP ${r.status})`);
  const d=await r.json();
  const content=d.files[GIST_FILE]?.content;
  try{return(JSON.parse(content||"{}").items||[]).map(migrateItem);}catch{return[];}
}
async function gSave(token,gistId,items){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify({items},null,2)}}})
  });
  if(!r.ok)throw new Error(`儲存失敗 (HTTP ${r.status})`);
}
async function gCreate(token){
  const r=await fetch("https://api.github.com/gists",{
    method:"POST",
    headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({description:"備貨追蹤 - 理貨台",public:false,files:{[GIST_FILE]:{content:JSON.stringify({items:[]})}}})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`建立失敗 (${r.status})：${e.message||"請確認 Token 是否有 gist 權限"}`);}
  return(await r.json()).id;
}

// ── Setup ──
function Setup({onDone}){
  const[tkn,setTkn]=useState("");
  const[gid,setGid]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const[newId,setNewId]=useState("");
  async function handle(createNew){
    if(!tkn.trim()){setErr("請輸入 Token");return;}
    if(!createNew&&!gid.trim()){setErr("請輸入 Gist ID");return;}
    setErr("");setBusy(true);
    try{
      let id=gid.trim();
      if(createNew){id=await gCreate(tkn.trim());setNewId(id);}
      await gFetch(tkn.trim(),id);
      localStorage.setItem("st_token",tkn.trim());
      localStorage.setItem("st_gist_id",id);
      onDone(tkn.trim(),id);
    }catch(e){setErr(e.message);}
    finally{setBusy(false);}
  }
  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,maxWidth:480,width:"100%",border:`1px solid ${C.line}`}}>
        <h1 style={{color:C.stamp}} className="font-bold text-xl mb-1">備貨追蹤 初次設定</h1>
        <p style={{color:C.inkMuted}} className="text-xs mb-5">資料儲存在 GitHub Gist，換裝置關手機都不會消失</p>
        <div style={{background:C.infoSoft,color:C.info,border:`1px solid ${C.info}`,borderRadius:10,padding:12,marginBottom:20,fontSize:12,lineHeight:2}}>
          <strong>先建立 GitHub 存取金鑰（只要做一次）</strong><br/>
          1. github.com → 右上角頭像 → Settings<br/>
          2. 左側最下方 Developer settings → Personal access tokens → Tokens (classic)<br/>
          3. Generate new token (classic) → 只勾 <code style={{background:"rgba(0,0,0,0.08)",padding:"1px 4px",borderRadius:3}}>gist</code> → Generate token<br/>
          4. 複製產生的 token（只出現一次）
        </div>
        <label style={{color:C.inkMuted}} className="text-xs block mb-1">GitHub Token</label>
        <input type="password" value={tkn} onChange={e=>setTkn(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"
          className="w-full px-3 py-2 rounded-lg mb-4 text-sm" style={{border:`1px solid ${C.line}`,fontFamily:"monospace"}}/>
        {newId&&(
          <div style={{background:C.successSoft,color:C.success,border:`1px solid ${C.success}`,borderRadius:10,padding:12,marginBottom:16,fontSize:12}}>
            ✅ 建立成功！Gist ID：<br/>
            <code style={{fontSize:11,wordBreak:"break-all",display:"block",marginTop:4,fontWeight:"bold"}}>{newId}</code>
            <span style={{color:C.inkMuted,display:"block",marginTop:4}}>換裝置時把這串貼到下方欄位</span>
          </div>
        )}
        {err&&<div style={{color:C.stamp,background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12}}>{err}</div>}
        <button onClick={()=>handle(true)} disabled={!tkn||busy}
          style={{background:C.stamp,opacity:(!tkn||busy)?0.5:1,border:"none",cursor:"pointer"}}
          className="w-full text-white font-medium py-2.5 rounded-lg mb-3 text-sm">
          {busy?"設定中…":"🆕 自動建立儲存空間（第一次用）"}
        </button>
        <div style={{color:C.inkMuted,textAlign:"center",fontSize:12,marginBottom:12}}>── 換裝置重新登入 ──</div>
        <label style={{color:C.inkMuted}} className="text-xs block mb-1">已有的 Gist ID</label>
        <input type="text" value={gid} onChange={e=>setGid(e.target.value)} placeholder="貼上之前記下的 Gist ID"
          className="w-full px-3 py-2 rounded-lg mb-3 text-sm" style={{border:`1px solid ${C.line}`,fontFamily:"monospace"}}/>
        <button onClick={()=>handle(false)} disabled={!tkn||!gid||busy}
          style={{border:`1px solid ${C.line}`,color:C.ink,background:C.surface,opacity:(!tkn||!gid||busy)?0.5:1,cursor:"pointer"}}
          className="w-full font-medium py-2 rounded-lg text-sm">
          {busy?"連線中…":"使用現有儲存空間"}
        </button>
      </div>
    </div>
  );
}

// ── Item Card ──
function ItemCard({it,sel,onToggleSel,onUpdate}){
  const late3=isLateOrder(it);
  const late14=isLateArrival(it);
  const days3=late3?daysSince(it.importedAt||it.orderDate):null;
  const days14=late14?daysSince(it.firstOrderDate):null;

  let borderColor=C.line;
  let bgColor=C.surface;
  if(it.allArrived){bgColor=C.successSoft;borderColor=C.success;}
  else if(late14){bgColor=C.warningSoft;borderColor=C.warning;}
  else if(late3){bgColor:C.orangeSoft;borderColor="#FFB74D";}
  if(sel&&!it.allArrived){borderColor=C.info;}

  function handleArrivedQty(val){
    const maxQ=it.orderedQty!=null?it.orderedQty:it.qty;
    const n=Math.max(0,parseInt(val,10)||0);
    const nowFull=n>=maxQ;
    onUpdate("arrivedQty",n);
    if(nowFull&&!it.allArrived){
      onUpdate("allArrived",true);
      if(!it.arrivedTs)onUpdate("arrivedTs",new Date().toISOString());
    }
  }
  function handleAllArrived(checked){
    const maxQ=it.orderedQty!=null?it.orderedQty:it.qty;
    onUpdate("allArrived",checked);
    if(checked){
      if(!it.arrivedTs)onUpdate("arrivedTs",new Date().toISOString());
      if(!it.arrivedQty||it.arrivedQty<maxQ)onUpdate("arrivedQty",maxQ);
    }else{
      onUpdate("arrivedTs","");
    }
  }

  return(
    <div style={{background:bgColor,border:`2px solid ${borderColor}`,borderRadius:12,marginBottom:10,padding:"12px 14px",
      boxShadow:sel?"0 0 0 3px rgba(29,111,163,0.15)":"none",transition:"border-color .15s"}}>

      {/* 警示徽章 */}
      {(late3||late14)&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {late3&&<span style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>⚠ {days3}天未訂貨</span>}
          {late14&&<span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>🚨 {days14}天未到貨</span>}
        </div>
      )}

      {/* 商品名稱列 */}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
        <input type="checkbox" checked={sel} onChange={onToggleSel}
          style={{width:22,height:22,marginTop:2,accentColor:C.info,cursor:"pointer",flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
            <span style={{color:it.allArrived?C.success:C.ink,fontWeight:700,fontSize:15}}>
              {it.product}
            </span>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <span style={{color:C.inkMuted,fontSize:11}}>需求</span>
              <span style={{background:C.stripe,color:C.inkMuted,borderRadius:20,padding:"2px 8px",fontSize:12}}>x{it.qty}</span>
              <span style={{color:C.inkMuted,fontSize:11}}>訂購</span>
              <input type="number" min="0" value={it.orderedQty!=null?it.orderedQty:it.qty}
                onChange={e=>onUpdate("orderedQty",Math.max(0,parseInt(e.target.value,10)||0))}
                style={{width:52,border:`1px solid ${C.info}`,borderRadius:8,padding:"2px 6px",fontSize:13,textAlign:"center",background:"#EFF6FC",color:C.info,fontWeight:600}}/>
            </div>
          </div>
          {(it.color||it.size||it.style)&&(
            <div style={{color:C.inkMuted,fontSize:12,marginTop:2}}>
              {[it.color,it.size,it.style].filter(Boolean).join(" · ")}
            </div>
          )}
        </div>
      </div>

      {/* 訂貨日期 */}
      <div style={{display:"flex",gap:8,marginBottom:10,paddingLeft:32}}>
        <div style={{flex:1}}>
          <div style={{color:C.inkMuted,fontSize:11,marginBottom:4}}>首次訂購日</div>
          <input type="date" value={it.firstOrderDate||""} onChange={e=>onUpdate("firstOrderDate",e.target.value)}
            style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,color:C.ink,background:C.bg}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{color:C.inkMuted,fontSize:11,marginBottom:4}}>二次訂購日<span style={{color:C.inkMuted,fontSize:10}}> （選填）</span></div>
          <input type="date" value={it.secondOrderDate||""} onChange={e=>onUpdate("secondOrderDate",e.target.value)}
            style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,color:C.ink,background:C.bg}}/>
        </div>
      </div>

      {/* 全數訂完 */}
      <div style={{paddingLeft:32,marginBottom:10}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
          <input type="checkbox" checked={!!it.allOrdered} onChange={e=>{onUpdate("allOrdered",e.target.checked);}}
            style={{width:20,height:20,accentColor:C.info,cursor:"pointer"}}/>
          <span style={{fontSize:13,color:it.allOrdered?C.info:C.inkMuted,fontWeight:it.allOrdered?"600":"400"}}>
            {it.allOrdered?"✔ 全數訂完":"全數訂完"}
          </span>
        </label>
      </div>

      {/* 到貨確認 */}
      <div style={{paddingLeft:32,borderTop:`1px solid ${C.line}`,paddingTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:C.inkMuted,fontSize:12,whiteSpace:"nowrap"}}>已到貨</span>
            <input type="number" min="0" value={it.arrivedQty||0}
              onChange={e=>handleArrivedQty(e.target.value)}
              style={{width:52,border:`1px solid ${C.line}`,borderRadius:8,padding:"5px 6px",fontSize:14,textAlign:"center",background:C.bg,color:C.ink}}/>
            <span style={{color:C.inkMuted,fontSize:12,whiteSpace:"nowrap"}}>/ {it.orderedQty!=null?it.orderedQty:it.qty} 件</span>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <input type="checkbox" checked={!!it.allArrived} onChange={e=>handleAllArrived(e.target.checked)}
              style={{width:22,height:22,accentColor:C.success,cursor:"pointer"}}/>
            <span style={{fontSize:13,color:it.allArrived?C.success:C.inkMuted,fontWeight:it.allArrived?"600":"400"}}>
              {it.allArrived?"✅ 全數到貨":"全數到貨"}
            </span>
          </label>
          {it.arrivedTs&&(
            <span style={{color:C.success,fontSize:11,whiteSpace:"nowrap"}}>{fmtTs(it.arrivedTs)}</span>
          )}
        </div>
        {it.arrivedQty>0&&!it.allArrived&&(
          <div style={{color:C.orange,fontSize:11,marginTop:4}}>
            ⚡ 部分到貨：{it.arrivedQty}/{it.orderedQty!=null?it.orderedQty:it.qty} 件
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main ──
function App(){
  const[token,setToken]=useState(()=>localStorage.getItem("st_token")||"");
  const[gistId,setGistId]=useState(()=>localStorage.getItem("st_gist_id")||"");
  const[setupMode,setSetupMode]=useState(!localStorage.getItem("st_gist_id"));
  const[items,setItems]=useState([]);
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[lastSaved,setLastSaved]=useState(null);
  const[globalErr,setGlobalErr]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[batchSel,setBatchSel]=useState(new Set());
  const[batchDate1,setBatchDate1]=useState("");
  const[batchDate2,setBatchDate2]=useState("");
  const fileRef=useRef(null);
  const saveTimer=useRef(null);
  const pendingUpdates=useRef({});

  useEffect(()=>{
    if(!setupMode&&token&&gistId){
      setLoading(true);
      gFetch(token,gistId).then(its=>{setItems(its);setLoading(false);})
        .catch(e=>{setGlobalErr(e.message);setLoading(false);});
    }
  },[]);

  const scheduleSave=useCallback((newItems)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSaving(true);
      gSave(token,gistId,newItems)
        .then(()=>{setSaving(false);setLastSaved(new Date());})
        .catch(e=>{setSaving(false);setGlobalErr("自動儲存失敗："+e.message);});
    },800);
  },[token,gistId]);

  function updateField(id,field,value){
    setItems(prev=>{
      const next=prev.map(it=>it.id===id?{...it,[field]:value}:it);
      scheduleSave(next);return next;
    });
  }
  // 批次更新同一個 item 多個欄位（避免連續setState覆蓋）
  function updateItem(id,updates){
    setItems(prev=>{
      const next=prev.map(it=>it.id===id?{...it,...updates}:it);
      scheduleSave(next);return next;
    });
  }

  function applyBatch(){
    if(batchSel.size===0)return;
    const updates={};
    if(batchDate1)updates.firstOrderDate=batchDate1;
    if(batchDate2)updates.secondOrderDate=batchDate2;
    if(!Object.keys(updates).length)return;
    setItems(prev=>{
      const next=prev.map(it=>batchSel.has(it.id)?{...it,...updates}:it);
      scheduleSave(next);return next;
    });
    setBatchSel(new Set());setBatchDate1("");setBatchDate2("");
  }

  function handleCSV(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    Promise.all(files.map(file=>new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=ev=>resolve(parseCSV(ev.target.result));
      reader.readAsText(file,"utf-8");
    }))).then(results=>{
      const aggMap={};
      results.forEach(parsed=>{
        parsed.forEach(p=>{
          const k=itemKey(p);
          if(aggMap[k])aggMap[k].qty+=p.qty;
          else aggMap[k]={...p};
        });
      });
      setItems(prev=>{
        const ex={};prev.forEach(it=>{ex[itemKey(it)]=it;});
        const merged=Object.values(aggMap).map(p=>{
          const k=itemKey(p);
          if(ex[k])return{...ex[k],qty:p.qty};
          return{...p,id:genId(),importedAt:todayStr(),firstOrderDate:todayStr(),secondOrderDate:"",allOrdered:false,orderedQty:p.qty,arrivedQty:0,allArrived:false,arrivedTs:""};
        });
        const mk=new Set(merged.map(itemKey));
        prev.forEach(it=>{if(!mk.has(itemKey(it)))merged.push(it);});
        scheduleSave(merged);return merged;
      });
    });
    e.target.value="";
  }

  function resetSetup(){
    localStorage.removeItem("st_token");localStorage.removeItem("st_gist_id");
    setToken("");setGistId("");setItems([]);setSetupMode(true);setShowSettings(false);
  }

  if(setupMode)return<Setup onDone={(t,g)=>{
    setToken(t);setGistId(g);setSetupMode(false);
    gFetch(t,g).then(its=>setItems(its)).catch(e=>setGlobalErr(e.message));
  }}/>;

  const displayed=items.filter(it=>{
    if(filter==="arrived")return it.allArrived;
    if(filter==="pending")return!it.allArrived;
    return true;
  }).filter(it=>!search.trim()||it.product.includes(search.trim()))
    .slice().sort((a,b)=>sortPri(a)-sortPri(b));

  const arrivedCount=items.filter(it=>it.allArrived).length;
  const late3Count=items.filter(isLateOrder).length;
  const late14Count=items.filter(isLateArrival).length;
  const allSel=displayed.length>0&&displayed.every(it=>batchSel.has(it.id));

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:batchSel.size>0?100:0}}>
      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div>
            <div style={{color:C.stamp,fontWeight:700,fontSize:17}}>備貨追蹤</div>
            <div style={{color:C.inkMuted,fontSize:11}}>到貨狀態管理</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {saving&&<span style={{color:C.inkMuted,fontSize:11}}>儲存中…</span>}
            {lastSaved&&!saving&&<span style={{color:C.inkMuted,fontSize:11}}>已儲存 {fmtSavedTime(lastSaved)}</span>}
            <button onClick={()=>fileRef.current.click()}
              style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              匯入備貨清單
            </button>
            <input ref={fileRef} type="file" accept=".csv" multiple style={{display:"none"}} onChange={handleCSV}/>
            <button onClick={()=>setShowSettings(!showSettings)}
              style={{border:`1px solid ${C.line}`,background:C.surface,color:C.inkMuted,borderRadius:8,padding:"7px 10px",fontSize:14,cursor:"pointer"}}>⚙</button>
          </div>
        </div>
        {showSettings&&(
          <div style={{background:C.stripe,borderTop:`1px solid ${C.line}`,padding:"10px 14px",fontSize:12,color:C.inkMuted}}>
            <div style={{maxWidth:640,margin:"0 auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>Gist ID：<code style={{fontSize:11,color:C.ink}}>{gistId}</code></span>
              <button onClick={()=>{try{navigator.clipboard.writeText(gistId);}catch{}}}
                style={{border:`1px solid ${C.line}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>複製</button>
              <button onClick={resetSetup}
                style={{color:C.stamp,border:`1px solid ${C.stamp}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>重置設定</button>
            </div>
          </div>
        )}
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
        {globalErr&&(
          <div style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>{globalErr}</span>
            <button onClick={()=>setGlobalErr("")} style={{marginLeft:8,textDecoration:"underline",cursor:"pointer"}}>關閉</button>
          </div>
        )}

        {/* Stats */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{color:C.ink,fontSize:14}}>
            已到貨 <strong style={{color:C.success}}>{arrivedCount}</strong> / {items.length} 筆
          </span>
          {late3Count>0&&<span style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>⚠ {late3Count} 筆逾3天未訂</span>}
          {late14Count>0&&<span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>🚨 {late14Count} 筆逾14天未到</span>}
          <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
            {[["all","全部"],["pending","待到貨"],["arrived","已到貨"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)}
                style={{background:filter===v?C.stamp:C.surface,color:filter===v?"#fff":C.inkMuted,border:`1px solid ${filter===v?C.stamp:C.line}`,borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* 搜尋 */}
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:16,pointerEvents:"none"}}>🔍</span>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋商品名稱"
            style={{width:"100%",border:`1px solid ${search?C.info:C.line}`,borderRadius:10,padding:"9px 36px 9px 34px",fontSize:14,background:C.surface,color:C.ink,boxSizing:"border-box"}}/>
          {search&&<button onClick={()=>setSearch("")}
            style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:18,background:"none",border:"none",cursor:"pointer"}}>×</button>}
        </div>
        {search&&displayed.length>0&&(
          <div style={{color:C.info,fontSize:12,marginBottom:8}}>找到 {displayed.length} 筆 ——勾選後可批次設訂購日</div>
        )}

        {/* 批次工具列 */}
        {displayed.length>0&&(
          <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:10,padding:"8px 12px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <input type="checkbox" checked={allSel}
                onChange={e=>{
                  if(e.target.checked)setBatchSel(new Set([...batchSel,...displayed.map(it=>it.id)]));
                  else setBatchSel(prev=>{const n=new Set(prev);displayed.forEach(it=>n.delete(it.id));return n;});
                }}
                style={{width:20,height:20,accentColor:C.info,cursor:"pointer"}}/>
              <span style={{color:C.inkMuted,fontSize:13,minWidth:60}}>
                {batchSel.size>0?`已選 ${batchSel.size} 筆`:"全選"}
              </span>
              {batchSel.size>0&&(
                <>
                  <div style={{display:"flex",alignItems:"center",flex:1,flexWrap:"wrap",gap:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{color:C.inkMuted,fontSize:11,whiteSpace:"nowrap"}}>首次</span>
                      <input type="date" value={batchDate1} onChange={e=>setBatchDate1(e.target.value)}
                        style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"5px 6px",fontSize:12,minWidth:120}}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{color:C.inkMuted,fontSize:11,whiteSpace:"nowrap"}}>二次</span>
                      <input type="date" value={batchDate2} onChange={e=>setBatchDate2(e.target.value)}
                        style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"5px 6px",fontSize:12,minWidth:120}}/>
                    </div>
                  </div>
                  <button onClick={applyBatch} disabled={!batchDate1&&!batchDate2}
                    style={{background:(batchDate1||batchDate2)?C.stamp:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:(batchDate1||batchDate2)?"pointer":"default",whiteSpace:"nowrap"}}>
                    套用
                  </button>
                  <button onClick={()=>{setBatchSel(new Set());setBatchDate1("");setBatchDate2("");}}
                    style={{color:C.inkMuted,border:`1px solid ${C.line}`,background:C.surface,borderRadius:8,padding:"6px 8px",fontSize:12,cursor:"pointer"}}>
                    取消
                  </button>
                </>
              )}
            </div>
          </div>
        )}

        {loading?(
          <div style={{color:C.inkMuted,textAlign:"center",padding:"48px 0",fontSize:14}}>讀取中…</div>
        ):items.length===0?(
          <div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"64px 16px"}}>
            <div style={{fontSize:36,marginBottom:12}}>📦</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>還沒有備貨資料</div>
            <div style={{fontSize:13}}>點右上角「匯入備貨清單」上傳從理貨台匯出的 CSV</div>
          </div>
        ):displayed.length===0?(
          <div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"40px 16px",fontSize:14}}>
            這個分類目前沒有資料
          </div>
        ):(
          displayed.map((it,idx)=>{
            const prev=displayed[idx-1];
            const showDivider=idx===0||(prev&&sortPri(prev)!==sortPri(it));
            return(
              <React.Fragment key={it.id}>
                {showDivider&&(
                  <div style={{color:C.inkMuted,fontSize:12,fontWeight:700,padding:"4px 2px 8px",marginTop:idx===0?0:12,letterSpacing:0.3}}>
                    {GROUP_LABEL[sortPri(it)]}
                  </div>
                )}
                <ItemCard it={it} sel={batchSel.has(it.id)}
                  onToggleSel={()=>{
                    setBatchSel(prev=>{const n=new Set(prev);n.has(it.id)?n.delete(it.id):n.add(it.id);return n;});
                  }}
                  onUpdate={(field,value)=>updateField(it.id,field,value)}/>
              </React.Fragment>
            );
          })
        )}
      </div>
    </div>
  );
}

try{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
}catch(err){
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">Render 錯誤：\n'+(err&&err.stack?err.stack:String(err))+'</div>';
}
</script>
</body>
</html>
