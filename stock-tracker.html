<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>備貨追蹤</title>
<script>
window.onerror=function(msg,src,line,col,err){
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">錯誤：\n'+String(msg)+'\n第'+line+'行\n'+(err&&err.stack?String(err.stack):'')+' </div>';
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#F5F3EE;}
input[type="date"]{-webkit-appearance:none;appearance:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

const C={
  bg:"#F5F3EE",surface:"#FFFFFF",stamp:"#B44635",ink:"#2D2416",
  inkMuted:"#7A6E5E",line:"#E5E0D5",stripe:"#FAF8F5",
  info:"#1D6FA3",infoSoft:"#EFF6FC",
  success:"#2D7D46",successSoft:"#EBF5EE",
  warning:"#92400E",warningSoft:"#FFF8ED",
};
const GIST_FILE="stock-tracker-data.json";
function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function itemKey(it){return[it.product,it.color,it.size,it.style].join("|||");}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtSavedTime(d){if(!d)return"";return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtArrivedTs(ts){
  if(!ts)return"";
  const d=new Date(ts);
  return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function daysSince(dateStr){
  if(!dateStr||isNaN(new Date(dateStr)))return null;
  return Math.floor((new Date(todayStr())-new Date(dateStr))/(1000*60*60*24));
}
function isLateOrder(it){
  // 超過3天還沒填訂貨日
  if(it.arrived||it.supplierOrderDate)return false;
  const d=daysSince(it.orderDate);
  return d!==null&&d>3;
}
function isLateArrival(it){
  // 訂貨後超過14天還沒到貨
  if(it.arrived||!it.supplierOrderDate)return false;
  const d=daysSince(it.supplierOrderDate);
  return d!==null&&d>14;
}
function sortPriority(it){
  if(it.arrived)return 3;
  if(it.supplierOrderDate)return 2;
  return 1;
}

function parseLine(line){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(ch===','&&!q){out.push(cur);cur="";}
    else cur+=ch;
  }
  out.push(cur);return out;
}
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.replace(/\r/g,"").split("\n").filter(Boolean);
  if(lines.length<2)return[];
  const hdr=parseLine(lines[0]).map(h=>h.trim());
  const ix=k=>hdr.findIndex(h=>h===k);
  const[pi,ci,si,sti,qi]=["商品名稱","顏色","尺寸","款式","數量"].map(ix);
  return lines.slice(1).map(line=>{
    const cols=parseLine(line).map(c=>c.trim());
    return{product:cols[pi]||"",color:cols[ci]||"",size:cols[si]||"",style:cols[sti]||"",qty:parseInt(cols[qi],10)||0};
  }).filter(r=>r.product);
}

async function gFetch(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.v3+json"}
  });
  if(!r.ok)throw new Error(`無法讀取 (HTTP ${r.status})`);
  const d=await r.json();
  const content=d.files[GIST_FILE]?.content;
  try{
    const parsed=JSON.parse(content||"{}").items||[];
    return parsed.map(it=>({...it,supplierOrderDate:it.supplierOrderDate||it.restockDate||""}));
  }catch{return[];}
}
async function gSave(token,gistId,items){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify({items},null,2)}}})
  });
  if(!r.ok)throw new Error(`儲存失敗 (HTTP ${r.status})`);
}
async function gCreate(token){
  const r=await fetch("https://api.github.com/gists",{
    method:"POST",
    headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({description:"備貨追蹤 - 理貨台",public:false,files:{[GIST_FILE]:{content:JSON.stringify({items:[]})}}})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`建立失敗 (${r.status})：${e.message||"請確認 Token 是否有 gist 權限"}`);}
  return(await r.json()).id;
}

// ── Setup ──
function Setup({onDone}){
  const[tkn,setTkn]=useState("");
  const[gid,setGid]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const[newId,setNewId]=useState("");

  async function handle(createNew){
    if(!tkn.trim()){setErr("請輸入 Token");return;}
    if(!createNew&&!gid.trim()){setErr("請輸入 Gist ID");return;}
    setErr("");setBusy(true);
    try{
      let id=gid.trim();
      if(createNew){id=await gCreate(tkn.trim());setNewId(id);}
      await gFetch(tkn.trim(),id);
      localStorage.setItem("st_token",tkn.trim());
      localStorage.setItem("st_gist_id",id);
      onDone(tkn.trim(),id);
    }catch(e){setErr(e.message);}
    finally{setBusy(false);}
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,borderRadius:16,padding:24,maxWidth:480,width:"100%",border:`1px solid ${C.line}`}}>
        <h1 style={{color:C.stamp}} className="font-bold text-xl mb-1">備貨追蹤 初次設定</h1>
        <p style={{color:C.inkMuted}} className="text-xs mb-5">資料儲存在 GitHub Gist，換裝置關手機都不會消失</p>
        <div style={{background:C.infoSoft,color:C.info,border:`1px solid ${C.info}`,borderRadius:10,padding:12,marginBottom:20,fontSize:12,lineHeight:2}}>
          <strong>先建立 GitHub 存取金鑰（只要做一次）</strong><br/>
          1. github.com → 右上角頭像 → Settings<br/>
          2. 左側最下方 Developer settings → Personal access tokens → Tokens (classic)<br/>
          3. Generate new token (classic) → 只勾 <code style={{background:"rgba(0,0,0,0.08)",padding:"1px 4px",borderRadius:3}}>gist</code> → Generate token<br/>
          4. 複製產生的 token（只出現一次）
        </div>
        <label style={{color:C.inkMuted}} className="text-xs block mb-1">GitHub Token</label>
        <input type="password" value={tkn} onChange={e=>setTkn(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"
          className="w-full px-3 py-2 rounded-lg mb-4 text-sm" style={{border:`1px solid ${C.line}`,fontFamily:"monospace"}}/>
        {newId&&(
          <div style={{background:C.successSoft,color:C.success,border:`1px solid ${C.success}`,borderRadius:10,padding:12,marginBottom:16,fontSize:12}}>
            ✅ 建立成功！Gist ID：<br/>
            <code style={{fontSize:11,wordBreak:"break-all",display:"block",marginTop:4,fontWeight:"bold"}}>{newId}</code>
            <span style={{color:C.inkMuted,display:"block",marginTop:4}}>換裝置時把這串貼到下方欄位</span>
          </div>
        )}
        {err&&<div style={{color:C.stamp,background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12}}>{err}</div>}
        <button onClick={()=>handle(true)} disabled={!tkn||busy}
          style={{background:C.stamp,opacity:(!tkn||busy)?0.5:1}}
          className="w-full text-white font-medium py-2.5 rounded-lg mb-3 text-sm">
          {busy?"設定中…":"🆕 自動建立儲存空間（第一次用）"}
        </button>
        <div style={{color:C.inkMuted,textAlign:"center",fontSize:12,marginBottom:12}}>── 換裝置重新登入 ──</div>
        <label style={{color:C.inkMuted}} className="text-xs block mb-1">已有的 Gist ID</label>
        <input type="text" value={gid} onChange={e=>setGid(e.target.value)} placeholder="貼上之前記下的 Gist ID"
          className="w-full px-3 py-2 rounded-lg mb-3 text-sm" style={{border:`1px solid ${C.line}`,fontFamily:"monospace"}}/>
        <button onClick={()=>handle(false)} disabled={!tkn||!gid||busy}
          style={{border:`1px solid ${C.line}`,color:C.ink,background:C.surface,opacity:(!tkn||!gid||busy)?0.5:1}}
          className="w-full font-medium py-2 rounded-lg text-sm">
          {busy?"連線中…":"使用現有儲存空間"}
        </button>
      </div>
    </div>
  );
}

// ── Item Card ──
function ItemCard({it,sel,onToggleSel,onUpdate,onToggleArrived}){
  const lateOrder=isLateOrder(it);
  const lateArrival=isLateArrival(it);
  const daysNoOrder=lateOrder?daysSince(it.orderDate):null;
  const daysNoArrival=lateArrival?daysSince(it.supplierOrderDate):null;

  let cardBorder=C.line;
  let cardBg=C.surface;
  if(it.arrived){cardBg=C.successSoft;}
  else if(lateArrival){cardBorder=C.warning;cardBg=C.warningSoft;}
  else if(lateOrder){cardBorder="#FFB74D";cardBg:"#FFF8F0";}
  else if(sel){cardBorder=C.info;}

  return(
    <div style={{
      background:cardBg,
      border:`1px solid ${sel&&!it.arrived?C.info:cardBorder}`,
      borderRadius:12,
      marginBottom:10,
      padding:"12px 14px",
      opacity:it.arrived?0.8:1,
      boxShadow:sel?"0 0 0 2px rgba(29,111,163,0.2)":lateArrival?"0 0 0 2px rgba(146,64,14,0.15)":lateOrder?"0 0 0 2px rgba(255,183,77,0.2)":"none",
    }}>
      {/* 警示徽章 */}
      {(lateOrder||lateArrival)&&(
        <div style={{marginBottom:8,display:"flex",gap:6,flexWrap:"wrap"}}>
          {lateOrder&&(
            <span style={{background:"#FFF3E0",color:"#E65100",border:"1px solid #FFB74D",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>
              ⚠ {daysNoOrder}天未訂貨
            </span>
          )}
          {lateArrival&&(
            <span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>
              🚨 {daysNoArrival}天未到貨
            </span>
          )}
        </div>
      )}
      {/* 上排：勾選 + 商品名稱 + 數量 */}
      <div className="flex items-start gap-3 mb-2">
        <input type="checkbox" checked={sel} onChange={onToggleSel}
          style={{width:22,height:22,marginTop:1,accentColor:C.info,cursor:"pointer",flexShrink:0}}/>
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between gap-2">
            <span style={{color:it.arrived?C.success:C.ink,fontWeight:600,fontSize:15}}>
              {it.arrived&&"✅ "}{it.product}
            </span>
            <span style={{background:C.stripe,color:C.inkMuted,borderRadius:20,padding:"1px 10px",fontSize:12,flexShrink:0}}>
              x{it.qty}
            </span>
          </div>
          {(it.color||it.size||it.style)&&(
            <div style={{color:C.inkMuted,fontSize:12,marginTop:2}}>
              {[it.color,it.size,it.style].filter(Boolean).join(" · ")}
            </div>
          )}
        </div>
      </div>

      {/* 日期列 */}
      <div className="flex gap-2 mb-2 pl-9">
        <div className="flex-1">
          <div style={{color:C.inkMuted,fontSize:11,marginBottom:3}}>訂購日</div>
          <input type="date" value={it.orderDate||""} onChange={e=>onUpdate("orderDate",e.target.value)}
            style={{width:"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,color:C.ink,background:C.bg}}/>
        </div>
        <div className="flex-1">
          <div style={{color:lateArrival?C.warning:C.inkMuted,fontSize:11,marginBottom:3,fontWeight:lateArrival?"600":"400"}}>
            訂貨日{lateArrival?" 🚨":""}
          </div>
          <input type="date" value={it.supplierOrderDate||""} onChange={e=>onUpdate("supplierOrderDate",e.target.value)}
            style={{width:"100%",border:`1px solid ${lateArrival?C.warning:C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,color:lateArrival?C.warning:C.ink,background:lateArrival?C.warningSoft:C.bg}}/>
        </div>
      </div>

      {/* 到貨確認 */}
      <div className="flex items-center gap-3 pl-9">
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
          <input type="checkbox" checked={!!it.arrived} onChange={e=>onToggleArrived(e.target.checked)}
            style={{width:24,height:24,accentColor:C.success,cursor:"pointer"}}/>
          <span style={{color:it.arrived?C.success:C.inkMuted,fontSize:14,fontWeight:it.arrived?"600":"400"}}>
            {it.arrived?"已到貨":"到貨確認"}
          </span>
        </label>
        {it.arrivedTs&&(
          <span style={{color:C.success,fontSize:12}}>{fmtArrivedTs(it.arrivedTs)}</span>
        )}
      </div>
    </div>
  );
}

// ── Main ──
function App(){
  const[token,setToken]=useState(()=>localStorage.getItem("st_token")||"");
  const[gistId,setGistId]=useState(()=>localStorage.getItem("st_gist_id")||"");
  const[setupMode,setSetupMode]=useState(!localStorage.getItem("st_gist_id"));
  const[items,setItems]=useState([]);
  const[filter,setFilter]=useState("all");
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[lastSaved,setLastSaved]=useState(null);
  const[globalErr,setGlobalErr]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[batchSel,setBatchSel]=useState(new Set());
  const[batchDate,setBatchDate]=useState("");
  const[search,setSearch]=useState("");
  const fileRef=useRef(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    if(!setupMode&&token&&gistId){
      setLoading(true);
      gFetch(token,gistId).then(its=>{setItems(its);setLoading(false);})
        .catch(e=>{setGlobalErr(e.message);setLoading(false);});
    }
  },[]);

  const scheduleSave=useCallback((newItems)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSaving(true);
      gSave(token,gistId,newItems)
        .then(()=>{setSaving(false);setLastSaved(new Date());})
        .catch(e=>{setSaving(false);setGlobalErr("自動儲存失敗："+e.message);});
    },700);
  },[token,gistId]);

  function update(id,field,value){
    setItems(prev=>{const next=prev.map(it=>it.id===id?{...it,[field]:value}:it);scheduleSave(next);return next;});
  }
  function toggleArrived(id,checked){
    setItems(prev=>{
      const next=prev.map(it=>it.id===id?{...it,arrived:checked,arrivedTs:checked?new Date().toISOString():""}:it);
      scheduleSave(next);return next;
    });
  }
  function toggleSel(id){
    setBatchSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  }
  function applyBatch(){
    if(!batchDate||batchSel.size===0)return;
    setItems(prev=>{
      const next=prev.map(it=>batchSel.has(it.id)?{...it,supplierOrderDate:batchDate}:it);
      scheduleSave(next);return next;
    });
    setBatchSel(new Set());setBatchDate("");
  }
  function handleCSV(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=parseCSV(ev.target.result);
      setItems(prev=>{
        const ex={};prev.forEach(it=>{ex[itemKey(it)]=it;});
        const merged=parsed.map(p=>{
          const k=itemKey(p);
          if(ex[k])return{...ex[k],qty:p.qty};
          return{...p,id:genId(),orderDate:todayStr(),supplierOrderDate:"",arrived:false,arrivedTs:""};
        });
        const mk=new Set(merged.map(itemKey));
        prev.forEach(it=>{if(!mk.has(itemKey(it)))merged.push(it);});
        scheduleSave(merged);return merged;
      });
    };
    reader.readAsText(file,"utf-8");
    e.target.value="";
  }
  function resetSetup(){
    localStorage.removeItem("st_token");localStorage.removeItem("st_gist_id");
    setToken("");setGistId("");setItems([]);setSetupMode(true);setShowSettings(false);
  }

  if(setupMode)return<Setup onDone={(t,g)=>{
    setToken(t);setGistId(g);setSetupMode(false);
    gFetch(t,g).then(its=>setItems(its)).catch(e=>setGlobalErr(e.message));
  }}/>;

  const displayed=items.filter(it=>{
    const matchFilter=filter==="arrived"?it.arrived:filter==="pending"?!it.arrived:true;
    const matchSearch=!search.trim()||it.product.includes(search.trim());
    return matchFilter&&matchSearch;
  }).slice().sort((a,b)=>sortPriority(a)-sortPriority(b));
  const arrivedCount=items.filter(it=>it.arrived).length;
  const lateOrderCount=items.filter(isLateOrder).length;
  const lateArrivalCount=items.filter(isLateArrival).length;
  const allSel=displayed.length>0&&displayed.every(it=>batchSel.has(it.id));

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:batchSel.size>0?90:0}}>
      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div>
            <div style={{color:C.stamp,fontWeight:700,fontSize:17}}>備貨追蹤</div>
            <div style={{color:C.inkMuted,fontSize:11}}>到貨狀態管理</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {saving&&<span style={{color:C.inkMuted,fontSize:11}}>儲存中…</span>}
            {lastSaved&&!saving&&<span style={{color:C.inkMuted,fontSize:11}}>已儲存 {fmtSavedTime(lastSaved)}</span>}
            <button onClick={()=>fileRef.current.click()}
              style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              匯入備貨清單
            </button>
            <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleCSV}/>
            <button onClick={()=>setShowSettings(!showSettings)}
              style={{border:`1px solid ${C.line}`,background:C.surface,color:C.inkMuted,borderRadius:8,padding:"7px 10px",fontSize:14,cursor:"pointer"}}>⚙</button>
          </div>
        </div>
        {showSettings&&(
          <div style={{background:C.stripe,borderTop:`1px solid ${C.line}`,padding:"10px 14px",fontSize:12,color:C.inkMuted,maxWidth:640,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>Gist ID：<code style={{fontSize:11,color:C.ink}}>{gistId}</code></span>
              <button onClick={()=>{try{navigator.clipboard.writeText(gistId);}catch{}}}
                style={{border:`1px solid ${C.line}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>複製</button>
              <button onClick={resetSetup}
                style={{color:C.stamp,border:`1px solid ${C.stamp}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>重置設定</button>
            </div>
          </div>
        )}
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
        {globalErr&&(
          <div style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>{globalErr}</span>
            <button onClick={()=>setGlobalErr("")} style={{marginLeft:8,textDecoration:"underline",cursor:"pointer"}}>關閉</button>
          </div>
        )}

        {/* Stats */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <span style={{color:C.ink,fontSize:14}}>
            已到貨 <strong style={{color:C.success}}>{arrivedCount}</strong> / {items.length} 筆
          </span>
          {lateOrderCount>0&&(
            <span style={{background:"#FFF3E0",color:"#E65100",border:"1px solid #FFB74D",borderRadius:20,padding:"2px 10px",fontSize:12}}>
              ⚠ {lateOrderCount} 筆逾3天未訂貨
            </span>
          )}
          {lateArrivalCount>0&&(
            <span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:12}}>
              🚨 {lateArrivalCount} 筆逾14天未到貨
            </span>
          )}
          <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
            {[["all","全部"],["pending","待到貨"],["arrived","已到貨"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)}
                style={{background:filter===v?C.stamp:C.surface,color:filter===v?"#fff":C.inkMuted,border:`1px solid ${filter===v?C.stamp:C.line}`,borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* 搜尋 */}
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:16,pointerEvents:"none"}}>🔍</span>
          <input
            type="text"
            value={search}
            onChange={e=>setSearch(e.target.value)}
            placeholder="搜尋商品名稱，例如：雲霧褲"
            style={{width:"100%",border:`1px solid ${search?C.info:C.line}`,borderRadius:10,padding:"9px 36px 9px 34px",fontSize:14,background:C.surface,color:C.ink,boxSizing:"border-box"}}
          />
          {search&&(
            <button onClick={()=>setSearch("")}
              style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:18,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>×</button>
          )}
        </div>
        {search&&(
          <div style={{color:C.info,fontSize:12,marginBottom:8}}>
            搜尋「{search}」— 找到 {displayed.length} 筆，勾選左上角可一次全選這個品項的所有規格
          </div>
        )}
        {displayed.length>0&&(
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:C.surface,border:`1px solid ${C.line}`,borderRadius:10}}>
            <input type="checkbox" checked={allSel}
              onChange={e=>{
                if(e.target.checked)setBatchSel(new Set([...batchSel,...displayed.map(it=>it.id)]));
                else setBatchSel(prev=>{const n=new Set(prev);displayed.forEach(it=>n.delete(it.id));return n;});
              }}
              style={{width:20,height:20,accentColor:C.info,cursor:"pointer"}}/>
            <span style={{color:C.inkMuted,fontSize:13}}>
              {batchSel.size>0?`已選 ${batchSel.size} 筆`:"全選"}
            </span>
            {batchSel.size>0&&(
              <>
                <span style={{color:C.inkMuted,fontSize:12,marginLeft:4}}>批次設訂貨日</span>
                <input type="date" value={batchDate} onChange={e=>setBatchDate(e.target.value)}
                  style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"5px 8px",fontSize:13,flex:1,minWidth:120}}/>
                <button onClick={applyBatch} disabled={!batchDate}
                  style={{background:batchDate?C.stamp:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"5px 12px",fontSize:13,fontWeight:600,cursor:batchDate?"pointer":"default",whiteSpace:"nowrap"}}>
                  套用
                </button>
                <button onClick={()=>{setBatchSel(new Set());setBatchDate("");}}
                  style={{color:C.inkMuted,border:`1px solid ${C.line}`,background:C.surface,borderRadius:8,padding:"5px 8px",fontSize:12,cursor:"pointer"}}>
                  取消
                </button>
              </>
            )}
          </div>
        )}

        {loading?(
          <div style={{color:C.inkMuted,textAlign:"center",padding:"48px 0",fontSize:14}}>讀取中…</div>
        ):items.length===0?(
          <div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"64px 16px"}}>
            <div style={{fontSize:36,marginBottom:12}}>📦</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>還沒有備貨資料</div>
            <div style={{fontSize:13}}>點右上角「匯入備貨清單」上傳從理貨台匯出的 CSV</div>
          </div>
        ):displayed.length===0?(
          <div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"40px 16px",fontSize:14}}>
            這個分類目前沒有資料
          </div>
        ):(
          displayed.map((it,idx)=>{
            const prev=displayed[idx-1];
            const showDivider=idx===0||(prev&&sortPriority(prev)!==sortPriority(it));
            const groupLabel=sortPriority(it)===1?"📋 未訂貨":sortPriority(it)===2?"🚚 已訂貨，待到貨":"✅ 已到貨";
            return(
              <React.Fragment key={it.id}>
                {showDivider&&(
                  <div style={{color:C.inkMuted,fontSize:12,fontWeight:600,padding:"4px 2px 8px",marginTop:idx===0?0:8}}>
                    {groupLabel}
                  </div>
                )}
                <ItemCard it={it} sel={batchSel.has(it.id)}
                  onToggleSel={()=>toggleSel(it.id)}
                  onUpdate={(field,val)=>update(it.id,field,val)}
                  onToggleArrived={checked=>toggleArrived(it.id,checked)}/>
              </React.Fragment>
            );
          })
        )}
      </div>
    </div>
  );
}

try{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
}catch(err){
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">Render 錯誤：\n'+(err&&err.stack?err.stack:String(err))+'</div>';
}
</script>
</body>
</html>
