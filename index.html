// ---------- 基礎工具 ----------
function normalize(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/\u3000/g, " ")
    .trim()
    .replace(/\s+/g, " ");
}
function compareKey(s) {
  return s
    .replace(/\s+/g, "")
    .replace(/[：﹕]/g, ":")
    .replace(/[｜|]/g, "|")
    .replace(/[／]/g, "/")
    .replace(/[（]/g, "(")
    .replace(/[）]/g, ")")
    .toUpperCase();
}
function guessColumn(cols, keywords) {
  return cols.find((c) => keywords.some((k) => c.includes(k))) || "";
}
function localeCmp(a, b) {
  return (a || "").localeCompare(b || "", "zh-Hant");
}
const SIZE_ORDER = { XXS: 0, XS: 1, S: 2, M: 3, L: 4, XL: 5, XXL: 6, XXXL: 7, "2XL": 6, "3XL": 7, "4XL": 8, "5XL": 9, FREE: 99, FREESIZE: 99, F: 99 };
function sizeSortValue(s) {
  if (!s) return [9999, ""];
  const upper = s.toUpperCase().replace(/\s+/g, "");
  if (upper in SIZE_ORDER) return [SIZE_ORDER[upper], s];
  const m = s.match(/-?\d+(\.\d+)?/);
  if (m) return [parseFloat(m[0]), s];
  return [9999, s];
}
function compareSizeStrings(a, b) {
  const [an, asv] = sizeSortValue(a);
  const [bn, bsv] = sizeSortValue(b);
  if (an !== bn) return an - bn;
  return localeCmp(asv, bsv);
}
function compareGroups(a, b, key, dir) {
  let primary = 0;
  if (key === "product") primary = localeCmp(a.product, b.product);
  else if (key === "color") primary = localeCmp(a.color, b.color);
  else if (key === "size") primary = compareSizeStrings(a.size, b.size);
  else if (key === "style") primary = localeCmp(a.style, b.style);
  else if (key === "qty") primary = a.qty - b.qty;
  else if (key === "customers") primary = Object.keys(a.customers).length - Object.keys(b.customers).length;
  if (dir === "desc") primary = -primary;
  if (primary !== 0) return primary;
  const p = localeCmp(a.product, b.product);
  if (p) return p;
  const c = localeCmp(a.color, b.color);
  if (c) return c;
  return compareSizeStrings(a.size, b.size);
}
function find(map, key) {
  let root = key;
  let guard = 0;
  while (map[root] && map[root] !== root && guard < 50) {
    root = map[root];
    guard++;
  }
  return root;
}
function union(map, a, b) {
  const ra = find(map, a);
  const rb = find(map, b);
  if (ra === rb) return map;
  return { ...map, [rb]: ra };
}

// 把「顏色:黑/兒童尺寸:120」這種合併文字拆成 顏色／尺寸／其他
function parseSpec(raw) {
  const s = normalize(raw).replace(/^規格選擇[:：]\s*/, "");
  if (!s) return { color: "", size: "", extra: "" };
  const segments = s.split("/").map((x) => x.trim()).filter(Boolean);
  const color = [];
  const size = [];
  const extra = [];
  segments.forEach((seg) => {
    const m = seg.match(/^(.+?)[:：](.+)$/);
    if (m) {
      const key = m[1].trim();
      const val = m[2].trim();
      if (key.includes("顏色")) color.push(val);
      else if (key.includes("尺寸") || key.includes("尺碼") || key.includes("身高") || key.includes("體重")) size.push(val);
      else if (key.includes("款式")) extra.push(val);
      else extra.push(`${key}:${val}`);
    } else if (seg.includes("\n")) {
      const parts = seg.split("\n").map((p) => p.trim()).filter(Boolean);
      if (parts.length >= 2) {
        color.push(parts[0]);
        size.push(parts.slice(1).join(" "));
      } else if (parts.length === 1) {
        extra.push(parts[0]);
      }
    } else if (size.length) {
      size[size.length - 1] = size[size.length - 1] + "/" + seg;
    } else {
      extra.push(seg);
    }
  });
  return { color: color.join("/"), size: size.join("/"), extra: extra.join("；") };
}

// 把「商品名稱_(規格文字)」這種嵌在商品名稱裡的規格拆出來（加購區手動建檔常見）
function splitEmbeddedSpec(name) {
  const idx = name.lastIndexOf("_(");
  if (idx >= 0 && name.endsWith(")")) {
    const base = name.slice(0, idx).trim();
    const inner = name.slice(idx + 2, -1).trim();
    if (base && inner) return { product: base, specText: inner };
  }
  return { product: name, specText: "" };
}

// 依「表頭=M ...」「明細=D ...」說明列，動態找出各欄位實際所在位置（不同匯出檔欄位數量不一定相同）
function resolveMDColumns(aoa) {
  let mCols = null;
  let dCols = null;
  for (const r of aoa) {
    const c0 = normalize((r && r[0]) ?? "");
    if (!mCols && c0.includes("表頭")) {
      const map = {};
      r.forEach((h, i) => (map[normalize(h)] = i));
      mCols = { account: map["訂購人"] ?? 1, name: map["收件人"] ?? 2, amount: map["小計"] ?? map["總金額(含運)"] ?? map["總金額"] ?? -1 };
    }
    if (!dCols && c0.includes("明細")) {
      const map = {};
      r.forEach((h, i) => (map[normalize(h)] = i));
      const specKey = Object.keys(map).find((k) => k.includes("規格"));
      dCols = {
        product: map["商品名稱"] ?? 1,
        qty: map["訂購數量"] ?? 3,
        spec: specKey ? map[specKey] : map["對應的商品規格名稱"] ?? 4,
      };
    }
    if (mCols && dCols) break;
  }
  return { mCols: mCols || { account: 1, name: 2, amount: -1 }, dCols: dCols || { product: 1, qty: 3, spec: 4 } };
}
function detectMDFormat(aoa) {
  let mCount = 0,
    dCount = 0,
    total = 0;
  aoa.slice(0, 400).forEach((r) => {
    const c0 = normalize((r && r[0]) ?? "");
    if (c0) total++;
    if (c0 === "M") mCount++;
    if (c0 === "D") dCount++;
  });
  return total > 0 && mCount > 0 && dCount > 0 && (mCount + dCount) / total > 0.6;
}
function parseMDSheet(aoa) {
  const { mCols, dCols } = resolveMDColumns(aoa);
  const rows = [];
  const warnings = [];
  const customerTotals = {};
  let current = null;
  aoa.forEach((r, idx) => {
    const c0 = normalize((r && r[0]) ?? "");
    if (c0 === "M") {
      const account = normalize(r[mCols.account]);
      const name = normalize(r[mCols.name]);
      const label = account && name ? `${account}（${name}）` : account || name || `第${idx + 1}列客人`;
      current = { name: label };
      let amount = 0;
      if (mCols.amount >= 0) {
        const cleaned = String(r[mCols.amount] ?? "").replace(/[^0-9.-]/g, "");
        amount = cleaned ? parseFloat(cleaned) : 0;
        if (Number.isNaN(amount)) amount = 0;
      }
      if (!customerTotals[label]) customerTotals[label] = { account, name, amount: 0, orders: 0, items: [] };
      customerTotals[label].amount += amount;
      customerTotals[label].orders += 1;
    } else if (c0 === "D") {
      if (!current) {
        warnings.push(idx + 1);
        return;
      }
      let product = normalize(r[dCols.product]);
      if (!product) return;
      let qty = parseInt(r[dCols.qty], 10);
      if (!qty || qty <= 0) qty = 1;
      let specText = normalize(r[dCols.spec]);
      if (!specText) {
        const split = splitEmbeddedSpec(product);
        if (split.specText) {
          product = split.product;
          specText = split.specText;
        }
      }
      const { color, size, extra } = parseSpec(specText);
      rows.push({ customer: current.name, product, color, size, extra, qty });
      if (customerTotals[current.name]) {
        const parts = [product];
        if (color) parts.push(color);
        if (size) parts.push(size);
        if (extra) parts.push(`(${extra})`);
        customerTotals[current.name].items.push(`${parts.join(" ")} x${qty}`);
      }
    }
  });
  return { rows, warnings, customerTotals };
}

// 偵測「商品名稱／規格／數量」撿貨單格式（含 HTML 表格匯出的 .xls）
function findHeaderRowIndex(aoa) {
  for (let i = 0; i < aoa.length; i++) {
    const nonEmpty = (aoa[i] || []).filter((c) => normalize(c) !== "").length;
    if (nonEmpty >= 4) return i;
  }
  return -1;
}
function detectPickingListHeader(aoa) {
  const idx = findHeaderRowIndex(aoa);
  if (idx < 0) return null;
  const header = aoa[idx].map((c) => normalize(c));
  const idxProduct = header.indexOf("商品名稱");
  const idxSpec = header.indexOf("規格");
  const idxQty = header.findIndex((c) => c.includes("數量"));
  if (idxProduct < 0 || idxSpec < 0 || idxQty < 0) return null;
  return { headerIdx: idx, idxProduct, idxSpec, idxQty };
}

// 把 HTML 表格（伺服器輸出、副檔名常是 .xls）轉成二維陣列
function htmlTableToAOA(text) {
  try {
    const doc = new DOMParser().parseFromString(text, "text/html");
    const table = doc.querySelector("table");
    if (!table) return null;
    const trs = Array.from(table.querySelectorAll("tr"));
    return trs.map((tr) => Array.from(tr.querySelectorAll("td,th")).map((td) => (td.textContent || "").replace(/\s+/g, " ").trim()));
  } catch (err) {
    return null;
  }
}

// 智慧讀檔：先判斷是不是「HTML 表格偽裝成 .xls」，不是的話才當二進位 xlsx/xls/csv 讀
function readFileSmart(file, onAoa, onError) {
  const tReader = new FileReader();
  tReader.onload = (e) => {
    const text = typeof e.target.result === "string" ? e.target.result : "";
    const trimmed = text.trim().toLowerCase();
    if (trimmed.startsWith("<") && trimmed.includes("<table")) {
      const aoa = htmlTableToAOA(text);
      if (aoa && aoa.length) {
        onAoa(aoa);
        return;
      }
    }
    const bReader = new FileReader();
    bReader.onload = (e2) => {
      try {
        const data = new Uint8Array(e2.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        onAoa(aoa);
      } catch (err) {
        onError("檔案解析失敗，請確認是有效的 .csv / .xls / .xlsx 檔案。");
      }
    };
    bReader.onerror = () => onError("檔案讀取失敗。");
    bReader.readAsArrayBuffer(file);
  };
  tReader.onerror = () => onError("檔案讀取失敗。");
  tReader.readAsText(file, "utf-8");
}

  // ---------- 核對撿貨單 ----------
  function refProcess(aoa) {
    const cleaned = (aoa || []).filter((r) => r && r.some((c) => normalize(c) !== ""));
    if (!cleaned.length) {
      setRefError("這個檔案讀不到任何資料。");

    }
    setRefError("");
    const picking = detectPickingListHeader(cleaned);
    if (picking) {
      const rows = [];
      cleaned.slice(picking.headerIdx + 1).forEach((r) => {
        let product = normalize(r[picking.idxProduct]);
        if (!product) return;
        let qty = parseInt(r[picking.idxQty], 10);
        if (!qty || qty <= 0) qty = 1;
        let specText = normalize(r[picking.idxSpec]);
        if (!specText) {
          const split = splitEmbeddedSpec(product);
          if (split.specText) {
            product = split.product;
            specText = split.specText;
          }
        }
        const { color, size, extra } = parseSpec(specText);
        rows.push({ product, color, size, extra, qty });
      });

      }
    }
    refGoManualMapping(cleaned);
  }
  function refGoManualMapping(aoa) {
    const headerRow = (aoa[0] || []).map((h, i) => normalize(h) || `欄位${i + 1}`);
    const objRows = aoa.slice(1).map((r) => {
      const o = {};
      headerRow.forEach((h, i) => (o[h] = r[i] ?? ""));
      return o;
    });
    setRefColumns(headerRow);
    setRefObjRows(objRows);
    setRefMapping({
      product: guessColumn(headerRow, ["商品", "品名"]),
      color: guessColumn(headerRow, ["顏色"]),
      size: guessColumn(headerRow, ["尺寸", "尺碼"]),
      spec: guessColumn(headerRow, ["規格"]),
      quantity: guessColumn(headerRow, ["數量", "件數"]),
    });

  }
  function handleReferenceFile(file) {

  }
  function handleRefDrop(e) {

  function confirmRefMapping() {
    const rows = refObjRows
      .map((o) => {

        if (!product) return null;
        let color = refMapping.color ? normalize(o[refMapping.color]) : "";

        let extra = "";

  function loadSampleReference() {

  }

  const comparisonRows = useMemo(() => {
    if (!referenceRows.length) return [];
    const mineMap = {};
    finalGroups.forEach((g) => {
      const ck = compareKey(`${g.product}|${g.color}|${g.size}|${g.style}`);
      if (!mineMap[ck]) mineMap[ck] = { product: g.product, color: g.color, size: g.size, style: g.style, qty: 0 };
      mineMap[ck].qty += g.qty;
    });
    const refMap = {};
    referenceRows.forEach((r) => {
      const ck = compareKey(`${r.product}|${r.color}|${r.size}|${r.extra || ""}`);
      if (!refMap[ck]) refMap[ck] = { product: r.product, color: r.color, size: r.size, style: r.extra || "", qty: 0 };
      refMap[ck].qty += r.qty;
    });
    const allKeys = new Set([...Object.keys(mineMap), ...Object.keys(refMap)]);
    const rows = [];
    allKeys.forEach((k) => {
      const mine = mineMap[k];
      const ref = refMap[k];
      const mineQty = mine ? mine.qty : 0;
      const refQty = ref ? ref.qty : 0;
      let status;
      if (mine && ref && mineQty === refQty) status = "match";
      else if (mine && ref) status = "mismatch";
      else if (mine && !ref) status = "extra";
      else status = "missing";
      const src = mine || ref;
      rows.push({ key: k, product: src.product, color: src.color, size: src.size, style: src.style, mineQty, refQty, status });
    });
    const order = { mismatch: 0, missing: 1, extra: 2, match: 3 };
    return rows.sort((a, b) => order[a.status] - order[b.status] || b.mineQty - a.mineQty);
  }, [finalGroups, referenceRows]);

  const issueCounts = comparisonRows.reduce(
    (acc, r) => {
      acc[r.status] = (acc[r.status] || 0) + 1;
      return acc;
    },

                        </span>
                        <span className="px-2.5 py-1 rounded-full flex items-center gap-1" style={{ background: COLORS.infoSoft, color: COLORS.info }}>
                          <PlusCircle size={12} /> {issueCounts.extra} 項對方沒有
                        </span>
                      </div>
                      <div className="flex items-center gap-3">
                        <label className="flex items-center gap-1.5 text-xs" style={{ color: COLORS.inkMuted }}>
                          <input type="checkbox" checked={onlyIssues} onChange={(e) => setOnlyIssues(e.target.checked)} /> 只看有問題的
                        </label>
                        <button onClick={resetReference} className="text-xs underline" style={{ color: COLORS.inkMuted }}>
                          重新上傳
                        </button>
                      </div>
                    </div>

                    <div className="rounded-xl overflow-x-auto" style={{ border: `1px solid ${COLORS.line}` }}>
                      <table className="w-full text-sm">
                        <thead>
                          <tr style={{ background: COLORS.stripe, color: COLORS.inkMuted }}>
                            <th className="text-left px-3 py-2 font-medium">商品名稱</th>
                            <th className="text-left px-3 py-2 font-medium">顏色</th>
                            <th className="text-left px-3 py-2 font-medium">尺寸</th>
                            <th className="text-left px-3 py-2 font-medium">款式</th>
                            <th className="text-right px-3 py-2 font-medium">我方</th>
                            <th className="text-right px-3 py-2 font-medium">對方</th>
                            <th className="text-left px-3 py-2 font-medium">狀態</th>
                          </tr>
                        </thead>
                        <tbody>
                          {visibleComparisonRows.map((r, idx) => {
                            const meta = STATUS_META[r.status];
                            const Icon = meta.icon;
                            return (
                              <tr key={r.key} style={{ background: idx % 2 ? COLORS.stripe : COLORS.surface, borderTop: `1px solid ${COLORS.line}` }}>
                                <td className="px-3 py-2.5 font-medium">{r.product}</td>
                                <td className="px-3 py-2.5">{r.color}</td>
                                <td className="px-3 py-2.5">{r.size}</td>
                                <td className="px-3 py-2.5">{r.style}</td>
                                <td className="text-right px-3 py-2.5" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                                  {r.mineQty || "—"}
                                </td>
                                <td className="text-right px-3 py-2.5" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                                  {r.refQty || "—"}
                                </td>
                                <td className="px-3 py-2.5">
                                  <span className="text-xs px-2 py-1 rounded-full inline-flex items-center gap-1" style={{ background: meta.bg, color: meta.color }}>
                                    <Icon size={12} /> {meta.label}
                                  </span>
                                </td>
                              </tr>
                            );
                          })}
                          {visibleComparisonRows.length === 0 && (
                            <tr>
                              <td colSpan={7} className="px-4 py-8 text-center text-sm" style={{ color: COLORS.inkMuted }}>
                                沒有問題項目可以顯示
                              </td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === "iopen" && (
              <div>
                <div className="rounded-xl p-4 mb-4 text-xs leading-relaxed" style={{ background: COLORS.infoSoft, color: COLORS.info, border: `1px solid ${COLORS.info}` }}>
                  每位客人會變成一筆「商品」：商品名稱＝IG帳號、售價＝這位客人喊單的總金額（小計加總，同一人多筆訂單會自動合併）、商品描述＝這位客人實際買的品項清單，方便你在 iOPEN Mall 用一個結帳連結請對方付清。
                  <br />
                  欄位結構已對照官方「商品大量上傳」範本（Data_Import_Items）核對過，匯出檔名也會自動符合 iOpen_ProductImport_開頭＋時間戳＋.xlsx 的規則，預計出貨天數也會限制在 1～180 之間。根據實際上傳測試結果，重量／長／寬／高其實也是必填數字（不得超過99999.999），已自動帶入1，不用另外填；商品圖(1)經實測也確認是必填，建議匯出前先填好圖片網址，否則上傳到 iOPEN Mall 後台時會被擋下來。
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                  <label className="text-xs" style={{ color: COLORS.inkMuted }}>
                    商品圖片網址（選填，所有人共用同一張；若留空，匯出後該欄會是空白，需要的話再自行於 Excel 或 iOPEN Mall 後台補上）
                    <input
                      type="text"
                      value={iopenImageUrl}
                      onChange={(e) => setIopenImageUrl(e.target.value)}
                      placeholder="https://...jpg 或 .png（可留空）"
                      className="mt-1 w-full px-2.5 py-1.5 rounded-md text-sm"
                      style={{ border: `1px solid ${COLORS.line}` }}
                    />
                  </label>
                  <label className="text-xs" style={{ color: COLORS.inkMuted }}>
                    商品分類編號
                    <input
                      type="text"
                      value={iopenCategoryCode}
                      onChange={(e) => setIopenCategoryCode(e.target.value)}
                      className="mt-1 w-full px-2.5 py-1.5 rounded-md text-sm"
                      style={{ border: `1px solid ${COLORS.line}`, fontFamily: "'JetBrains Mono', monospace" }}
                    />
                  </label>
                  <label className="text-xs" style={{ color: COLORS.inkMuted }}>
                    預計出貨天數（1～180）
                    <input
                      type="text"
                      value={iopenShipDays}
                      onChange={(e) => setIopenShipDays(e.target.value)}
                      className="mt-1 w-full px-2.5 py-1.5 rounded-md text-sm"
                      style={{ border: `1px solid ${COLORS.line}`, fontFamily: "'JetBrains Mono', monospace" }}
                    />
                  </label>
                </div>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-sm" style={{ color: COLORS.inkMuted }}>
                    已勾選 {iopenSelected.size} / {customerOrderTotals.length} 位客人
                  </span>
                  <button onClick={exportIopenXLSX} disabled={iopenSelected.size === 0} className="flex items-center gap-1.5 text-xs px-3 py-2 rounded-md font-medium text-white disabled:opacity-40" style={{ background: COLORS.stamp }}>
                    <Download size={14} /> 匯出已勾選的 iOPEN Mall Excel
                  </button>
                </div>
                <div className="rounded-xl overflow-x-auto" style={{ border: `1px solid ${COLORS.line}` }}>
                  <table className="w-full text-sm">
                    <thead>
                      <tr style={{ background: COLORS.stripe, color: COLORS.inkMuted }}>
                        <th className="px-3 py-2 font-medium">
                          <input
                            type="checkbox"
                            checked={customerOrderTotals.length > 0 && iopenSelected.size === customerOrderTotals.length}
                            onChange={(e) => {
                              if (e.target.checked) {
                                setIopenSelected(new Set(customerOrderTotals.map((c, idx) => iopenKey(c, idx))));
                              } else {
                                setIopenSelected(new Set());
                              }
                            }}
                          />
                        </th>
                        <th className="text-left px-3 py-2 font-medium">IG帳號（商品名稱）</th>
                        <th className="text-left px-3 py-2 font-medium">真實姓名</th>
                        <th className="text-right px-3 py-2 font-medium">訂單數</th>
                        <th className="text-right px-3 py-2 font-medium">喊單總金額（售價）</th>
                      </tr>
                    </thead>
                    <tbody>
                      {customerOrderTotals.map((c, idx) => {
                        const key = iopenKey(c, idx);
                        const checked = iopenSelected.has(key);
                        return (
                          <tr key={key} style={{ background: idx % 2 ? COLORS.stripe : COLORS.surface, borderTop: `1px solid ${COLORS.line}` }}>
                            <td className="px-3 py-2.5">
                              <input
                                type="checkbox"
                                checked={checked}
                                onChange={(e) => {
                                  setIopenSelected((prev) => {
                                    const next = new Set(prev);
                                    if (e.target.checked) next.add(key);
                                    else next.delete(key);
                                    return next;
                                  });
                                }}
                              />
                            </td>
                            <td className="px-3 py-2.5 font-medium">{c.account || "（無帳號）"}</td>
                            <td className="px-3 py-2.5" style={{ color: COLORS.inkMuted }}>
                              {c.name}
                            </td>
                            <td className="text-right px-3 py-2.5" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                              {c.orders}
                            </td>
                            <td className="text-right px-3 py-2.5 font-bold" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                              {c.amount}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === "raw" && (
              <div className="rounded-xl overflow-auto" style={{ border: `1px solid ${COLORS.line}`, maxHeight: "70vh" }}>
                <table className="w-full text-xs">
                  <thead>
                    <tr style={{ background: COLORS.stripe, color: COLORS.inkMuted }}>
                      {hasCustomerData && <th className="text-left px-3 py-2 font-medium whitespace-nowrap">客人</th>}
                      <th className="text-left px-3 py-2 font-medium whitespace-nowrap">商品名稱</th>
                      <th className="text-left px-3 py-2 font-medium whitespace-nowrap">顏色</th>
                      <th className="text-left px-3 py-2 font-medium whitespace-nowrap">尺寸</th>
                      <th className="text-left px-3 py-2 font-medium whitespace-nowrap">款式</th>
                      <th className="text-right px-3 py-2 font-medium whitespace-nowrap">數量</th>
                    </tr>
                  </thead>
                  <tbody>
                    {parsedRows.map((r, i) => (
                      <tr key={i} style={{ background: i % 2 ? COLORS.stripe : COLORS.surface, borderTop: `1px solid ${COLORS.line}` }}>
                        {hasCustomerData && <td className="px-3 py-2 whitespace-nowrap">{r.customer}</td>}
                        <td className="px-3 py-2 whitespace-nowrap">{r.product}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{r.color}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{r.size}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{r.extra}</td>
                        <td className="text-right px-3 py-2 whitespace-nowrap" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                          {r.qty}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </>
        )}
      </main>
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<LiveOrderSorter />);
} catch (err) {
  document.body.innerHTML =
    '<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;line-height:1.6;">' +
    '網頁載入時發生錯誤（render），請把這段文字截圖給 Claude：\n\n' +
    (err && err.stack ? String(err.stack) : String(err)) +
    '</div>';
}
</script>
</body>
</html>
